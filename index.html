<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>HTML Runner Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg_color: #0f172a;
      --panel_color: #111827;
      --border_color: #334155;
      --text_color: #e5e7eb;
      --muted_text_color: #94a3b8;
      --accent_color: #38bdf8;
      --danger_color: #ef4444;
      --success_color: #22c55e;
      --input_bg_color: #020617;
      --warning_button_color: #f59e0b;
      --warning_button_text_color: #1f1300;
      --danger_button_color: #dc2626;
      --danger_button_text_color: #fff7f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg_color);
      color: var(--text_color);
      font-family: sans-serif;
    }

    .page_root {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
    }

    .panel_box {
      background: var(--panel_color);
      border: 1px solid var(--border_color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .title_text {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .description_text {
      margin: 0;
      color: var(--muted_text_color);
      line-height: 1.5;
      font-size: 14px;
    }

    .editor_textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      background: var(--input_bg_color);
      color: var(--text_color);
      border: 1px solid var(--border_color);
      border-radius: 10px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .button_row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .action_button {
      border: 1px solid var(--border_color);
      border-radius: 10px;
      background: #1e293b;
      color: var(--text_color);
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .primary_button {
      background: var(--accent_color);
      color: #001018;
      border-color: transparent;
      font-weight: bold;
    }

    .warning_button {
      background: var(--warning_button_color);
      color: var(--warning_button_text_color);
      border-color: transparent;
      font-weight: bold;
    }

    .danger_button {
      background: var(--danger_button_color);
      color: var(--danger_button_text_color);
      border-color: transparent;
      font-weight: bold;
    }

    .status_box {
      margin-top: 10px;
      min-height: 24px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }

    .status_success {
      color: var(--success_color);
    }

    .status_error {
      color: var(--danger_color);
    }

    .report_box {
      margin-top: 10px;
      background: var(--input_bg_color);
      border: 1px solid var(--border_color);
      border-radius: 10px;
      padding: 10px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="page_root">
    <section class="panel_box">
      <h1 class="title_text">HTML Runner Editor</h1>
      <p class="description_text">
        下にHTMLを書いて「別ページで実行」を押すと、preview.html に遷移して全画面表示します。
        DEV_MODEがONのときは起動前にセルフテストを実行し、失敗時は安全停止します。
      </p>
    </section>

    <section class="panel_box">
      <h2 class="title_text">HTML入力</h2>
      <textarea id="html_input" class="editor_textarea"><h1>Hello</h1>
<p>このHTMLは別ページで全画面表示されます。</p>
<button onclick="document.body.style.background='lavender'">背景変更</button></textarea>

      <div class="button_row">
        <button id="open_preview_button" class="action_button primary_button" type="button">別ページで実行</button>
        <button id="test_button" class="action_button" type="button">セルフテスト再実行</button>
        <button id="reset_button" class="action_button warning_button" type="button">初期化</button>
        <button id="clear_button" class="action_button danger_button" type="button">全削除</button>
      </div>

      <div id="status_box" class="status_box"></div>
      <div id="report_box" class="report_box"></div>
    </section>
  </div>

  <script>
    const DEV_MODE = true;
    const PREVIEW_STORAGE_KEY = "html_runner_preview_payload_v1";

    const DEFAULT_HTML_TEXT = `<h1>Hello</h1>
<p>このHTMLは別ページで全画面表示されます。</p>
<button onclick="document.body.style.background='lavender'">背景変更</button>`;

    const app_state = {
      tests_passed: false,
      bound_elements: null
    };

    function assert_true(test_name, condition_value) {
      if (!condition_value) {
        throw new Error("Assertion failed: " + test_name);
      }
    }

    function create_preview_payload_text(input_html_text) {
      if (typeof input_html_text !== "string") {
        throw new Error("input_html_text must be a string");
      }

      const payload_object = {
        html_text: input_html_text
      };

      return JSON.stringify(payload_object);
    }

    function save_preview_payload_text(storage_key, payload_text) {
      if (typeof storage_key !== "string" || storage_key.length === 0) {
        throw new Error("storage_key must be a non-empty string");
      }

      if (typeof payload_text !== "string") {
        throw new Error("payload_text must be a string");
      }

      sessionStorage.setItem(storage_key, payload_text);
    }

    function create_confirm_message_text(action_name) {
      if (action_name === "reset") {
        return "初期化して本当によいですか？入力中のHTMLは初期状態に戻ります。";
      }

      if (action_name === "clear") {
        return "全削除して本当によいですか？入力中のHTMLは空になります。";
      }

      throw new Error("unknown confirm action: " + String(action_name));
    }

    function confirm_destructive_action(action_name) {
      const message_text = create_confirm_message_text(action_name);
      return window.confirm(message_text);
    }

    function test_normal_creates_reset_confirm_message() {
      const message_text = create_confirm_message_text("reset");

      assert_true(
        "normal_creates_reset_confirm_message: matches reset message",
        message_text === "初期化して本当によいですか？入力中のHTMLは初期状態に戻ります。"
      );
    }

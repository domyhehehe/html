<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>SquareMan X-ish</title>
<style>
  body{
    margin:0;
    background:#0b0f17;
    color:#e7eefc;
    font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    touch-action:none;
    user-select:none;
  }
  canvas{
    display:block;
    width:100vw;
    height:56vw;
    max-height:100vh;
    margin:0 auto;
    background:#0a0f1b;
  }
  /* ==== Mobile Buttons ==== */
  #controls{
    position:fixed;
    inset:auto 0 8px 0;
    display:flex;
    justify-content:space-between;
    padding:0 12px;
    pointer-events:none;
  }
  .pad,.btn{
    pointer-events:auto;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.25);
    border-radius:14px;
    color:#fff;
    font-size:20px;
    font-weight:900;
    padding:14px 18px;
  }
  .pad{ display:flex; gap:10px; }
</style>
</head>
<body>

<canvas id="game" width="960" height="540"></canvas>

<!-- ===== Mobile Controls ===== -->
<div id="controls">
  <div class="pad">
    <button class="btn" id="btnLeft">◀</button>
    <button class="btn" id="btnRight">▶</button>
  </div>
  <div class="pad">
    <button class="btn" id="btnJump">▲</button>
    <button class="btn" id="btnShoot">●</button>
    <button class="btn" id="btnCharge">◎</button>
  </div>
</div>

<script>
(() => {
"use strict";

/* ===== Canvas ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const DPR = window.devicePixelRatio||1;
function resize(){
  const w = innerWidth;
  canvas.width = w*DPR;
  canvas.height = Math.floor(w*0.56)*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize",resize);
resize();

/* ===== World ===== */
const TILE=32;
const map=[
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"................................................................",
"......................#...............#.................G......",
"....S.................#...............#........................",
"######################..#############..########################",
"######################..#############..########################",
];
const H=map.length,W=map[0].length;
const solid=(x,y)=> map[y]?.[x]==="#";

/* ===== Player ===== */
const player={
  x:64,y:200,w:18,h:28,
  vx:0,vy:0,
  onGround:false,
  dir:1,
  charging:false,
  chargeT:0
};

/* ===== Input State ===== */
const key={left:false,right:false,down:false,jump:false};

/* ===== Keyboard ===== */
addEventListener("keydown",e=>{
  if(e.code==="ArrowLeft") key.left=true;
  if(e.code==="ArrowRight") key.right=true;
  if(e.code==="ArrowUp"||e.code==="KeyZ") key.jump=true;
  if(e.code==="Space"||e.code==="KeyX") shoot(1);
  if(e.code==="KeyC"){ player.charging=true; player.chargeT=0; }
});
addEventListener("keyup",e=>{
  if(e.code==="ArrowLeft") key.left=false;
  if(e.code==="ArrowRight") key.right=false;
  if(e.code==="ArrowUp"||e.code==="KeyZ") key.jump=false;
  if(e.code==="KeyC" && player.charging){ releaseCharge(); }
});

/* ===== Mobile Buttons ===== */
const bind=(id,down,up)=>{
  const b=document.getElementById(id);
  b.addEventListener("pointerdown",e=>{e.preventDefault();down();});
  b.addEventListener("pointerup",e=>{e.preventDefault();up&&up();});
  b.addEventListener("pointercancel",()=>up&&up());
};
bind("btnLeft",()=>key.left=true,()=>key.left=false);
bind("btnRight",()=>key.right=true,()=>key.right=false);
bind("btnJump",()=>jump());
bind("btnShoot",()=>shoot(1));
bind("btnCharge",
 ()=>{player.charging=true;player.chargeT=0;},
 ()=>releaseCharge()
);

/* ===== Shooting ===== */
const bullets=[];
function shoot(p){
  bullets.push({
    x:player.dir>0?player.x+player.w:player.x-6,
    y:player.y+10,
    vx:player.dir*(p===1?500:380),
    w:p===1?6:12,
    h:p===1?4:8,
    life:1.2
  });
}
function releaseCharge(){
  const p = player.chargeT<0.5?1:3;
  shoot(p);
  player.charging=false;
  player.chargeT=0;
}

/* ===== Jump ===== */
function jump(){
  if(player.onGround){
    player.vy=-1110;
    player.onGround=false;
  }
}

/* ===== Physics ===== */
function move(ent,dx,dy){
  ent.x+=dx;
  if(dx){
    const l=Math.floor(ent.x/TILE),
          r=Math.floor((ent.x+ent.w)/TILE),
          t=Math.floor(ent.y/TILE),
          b=Math.floor((ent.y+ent.h-1)/TILE);
    for(let y=t;y<=b;y++){
      if(dx>0 && solid(r,y)){ ent.x=r*TILE-ent.w; ent.vx=0; }
      if(dx<0 && solid(l,y)){ ent.x=(l+1)*TILE; ent.vx=0; }
    }
  }
  ent.y+=dy;
  ent.onGround=false;
  if(dy){
    const l=Math.floor(ent.x/TILE),
          r=Math.floor((ent.x+ent.w-1)/TILE),
          t=Math.floor(ent.y/TILE),
          b=Math.floor((ent.y+ent.h)/TILE);
    for(let x=l;x<=r;x++){
      if(dy>0 && solid(x,b)){
        ent.y=b*TILE-ent.h;
        ent.vy=0;
        ent.onGround=true;
      }
    }
  }
}

/* ===== Loop ===== */
let last=0;
function loop(t){
  const dt=Math.min(0.033,(t-last)/1000); last=t;

  // input
  const maxV=200;
  if(key.left){ player.vx=Math.max(player.vx-1200*dt,-maxV); player.dir=-1; }
  if(key.right){ player.vx=Math.min(player.vx+1200*dt,maxV); player.dir=1; }
  if(!key.left&&!key.right) player.vx*=0.8;

  if(key.jump) jump();

  // charge
  if(player.charging) player.chargeT=Math.min(1.2,player.chargeT+dt);

  // gravity
  player.vy+=980*dt;
  move(player,player.vx*dt,player.vy*dt);

  // bullets
  bullets.forEach(b=>{ b.x+=b.vx*dt; b.life-=dt; });
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].life<=0) bullets.splice(i,1);

  render();
  requestAnimationFrame(loop);
}

/* ===== Render ===== */
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  // map
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    if(map[y][x]==="#"){
      ctx.fillStyle="rgba(255,255,255,.15)";
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
    if(map[y][x]==="G"){
      ctx.fillStyle="rgba(78,229,154,.8)";
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }
  // bullets
  ctx.fillStyle="#fff";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
  // player (4色ブロック)
  ctx.fillStyle="#0b66ff";
  ctx.fillRect(player.x,player.y+10,18,18);
  ctx.fillStyle="#fff";
  ctx.fillRect(player.x+3,player.y,12,10);
  ctx.fillStyle="#ffd25a";
  ctx.fillRect(player.x+3,player.y+4,12,3);
  ctx.fillStyle="#ff9ecf";
  ctx.fillRect(player.x-2,player.y+12,4,8);
  ctx.fillRect(player.x+16,player.y+12,4,8);
  ctx.restore();
}

requestAnimationFrame(loop);
})();
</script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#eef2f7">
  <title>Mermaid図 PNG変換</title>

  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --panel: #ffffff;
      --line: #cbd5e1;
      --text: #172033;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #be123c;
      --danger-bg: #fff1f2;
      --info: #1e3a8a;
      --info-bg: #eff6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        "Yu Gothic UI",
        "Yu Gothic",
        "Hiragino Kaku Gothic ProN",
        Meiryo,
        system-ui,
        sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding-bottom: env(safe-area-inset-bottom);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    input,
    select {
      min-height: 42px;
      border-radius: 9px;
      font-size: 16px;
    }

    button {
      border: 0;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.55;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-hover);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .danger {
      border: 1px solid #fecaca;
      background: var(--danger-bg);
      color: var(--danger);
    }

    .app {
      width: min(1500px, calc(100% - 24px));
      margin: 14px auto;
    }

    h1 {
      margin: 0 0 5px;
      font-size: clamp(23px, 4vw, 34px);
      line-height: 1.25;
    }

    .lead {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /*
     * 描画・保存・画面切替は常に上部へ固定する。
     */
    .workspace-bar {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 50;
      display: grid;
      grid-template-columns: auto auto auto auto 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgb(255 255 255 / 0.97);
      box-shadow: 0 8px 24px rgb(15 23 42 / 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .workspace-bar button {
      white-space: nowrap;
    }

    .view-switch {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .view-tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    /*
     * エラーと処理ログも上部へ固定する。
     */
    .top-status {
      position: sticky;
      top: calc(62px + env(safe-area-inset-top));
      z-index: 45;
      display: none;
      margin-bottom: 8px;
      padding: 10px 12px;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: var(--info-bg);
      color: var(--info);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      box-shadow: 0 6px 18px rgb(15 23 42 / 0.06);
    }

    .top-status.show {
      display: block;
    }

    .top-status.error {
      border-color: #fecdd3;
      background: var(--danger-bg);
      color: var(--danger);
    }

    /*
     * 普段あまり触らない設定は折りたたむ。
     */
    .settings {
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .settings summary {
      padding: 11px 13px;
      cursor: pointer;
      font-weight: 800;
      user-select: none;
    }

    .settings-body {
      padding: 0 10px 10px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 9px;
      align-items: end;
      padding: 10px;
      border-radius: 10px;
      background: #f8fafc;
    }

    .field {
      display: grid;
      min-width: 0;
      gap: 4px;
    }

    .field.wide {
      grid-column: span 2;
    }

    label {
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .limit-info {
      min-height: 42px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      font-size: 14px;
    }

    /*
     * PCではエディタとプレビューを横並び。
     */
    .grid {
      display: grid;
      grid-template-columns: minmax(340px, 0.9fr) minmax(460px, 1.4fr);
      gap: 14px;
      min-height: 680px;
    }

    .panel {
      display: flex;
      min-width: 0;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 8px 30px rgb(15 23 42 / 0.06);
    }

    .panel-title {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    #source {
      width: 100%;
      flex: 1;
      min-height: 600px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 14px;
      background: #0f172a;
      color: #e2e8f0;
      caret-color: #fff;
      font:
        14px/1.55 Consolas,
        "SFMono-Regular",
        Menlo,
        monospace;
      tab-size: 2;
    }

    #previewWrap {
      flex: 1;
      min-height: 580px;
      overflow: auto;
      padding: 16px;
      background:
        linear-gradient(
          45deg,
          #f8fafc 25%,
          transparent 25%
        ) 0 0 / 24px 24px,
        linear-gradient(
          45deg,
          transparent 75%,
          #f8fafc 75%
        ) 0 0 / 24px 24px,
        linear-gradient(
          45deg,
          transparent 75%,
          #f8fafc 75%
        ) 12px -12px / 24px 24px,
        linear-gradient(
          45deg,
          #f8fafc 25%,
          #fff 25%
        ) 12px 12px / 24px 24px;
      -webkit-overflow-scrolling: touch;
    }

    #preview {
      display: grid;
      min-width: max-content;
      min-height: 100%;
      place-items: center;
    }

    /*
     * 幅に合わせる表示。
     * PNG出力時の実寸には影響させない。
     */
    #preview.fit {
      width: 100%;
      min-width: 0;
    }

    #preview.fit svg {
      width: min(100%, 1100px) !important;
      max-width: 100% !important;
      height: auto !important;
    }

    @media (max-width: 900px) {
      .app {
        width: calc(100% - 12px);
        margin: 6px auto;
      }

      h1 {
        font-size: 22px;
      }

      .lead {
        font-size: 13px;
      }

      .workspace-bar {
        grid-template-columns: 1fr 1fr;
        padding: 7px;
      }

      .workspace-bar .spacer {
        display: none;
      }

      .view-switch {
        grid-column: 1 / -1;
        justify-content: stretch;
      }

      .view-switch button {
        flex: 1;
      }

      .top-status {
        top: calc(151px + env(safe-area-inset-top));
      }

      .settings-grid {
        grid-template-columns: 1fr 1fr;
      }

      .field.wide {
        grid-column: 1 / -1;
      }

      /*
       * スマホは編集とプレビューを切り替える。
       */
      .grid {
        display: block;
        min-height: 0;
      }

      .panel {
        min-height: calc(100dvh - 270px);
      }

      .panel[data-view="hidden"] {
        display: none;
      }

      #source {
        min-height: calc(100dvh - 330px);
        font-size: 13px;
      }

      #previewWrap {
        min-height: calc(100dvh - 330px);
        padding: 8px;
      }

      #preview {
        width: 100%;
        min-width: 0;
      }

      .desktop-only {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .settings-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Mermaid図 → PNG</h1>

    <p class="lead">
      Mermaidコードを編集し、描画、プレビュー、PNG・SVG保存まで
      ブラウザ内で行います。
    </p>

    <!--
      最も頻繁に使う操作だけを固定バーへ置く。
    -->
    <div class="workspace-bar">
      <button
        id="renderBtn"
        class="primary"
        type="button"
      >
        図を描画
      </button>

      <button
        id="downloadBtn"
        class="primary"
        type="button"
      >
        PNG保存
      </button>

      <button
        id="svgBtn"
        class="secondary"
        type="button"
      >
        SVG保存
      </button>

      <button
        id="clearBtn"
        class="danger"
        type="button"
      >
        コードをクリア
      </button>

      <div class="spacer"></div>

      <div class="view-switch">
        <button
          id="editTab"
          class="view-tab secondary active"
          type="button"
        >
          編集
        </button>

        <button
          id="previewTab"
          class="view-tab secondary"
          type="button"
        >
          プレビュー
        </button>

        <button
          id="fitBtn"
          class="secondary"
          type="button"
        >
          原寸で見る
        </button>
      </div>
    </div>

    <!--
      構文エラー、保存結果、処理状況を画面上部へ表示する。
    -->
    <div
      id="topStatus"
      class="top-status"
      role="status"
      aria-live="polite"
    ></div>

    <details class="settings">
      <summary>設定・サンプル</summary>

      <div class="settings-body">
        <div class="settings-grid">
          <div class="field wide">
            <label for="sampleSelect">
              サンプルを読み込む
            </label>

            <select id="sampleSelect">
              <option value="">
                選択してください
              </option>

              <option value="flow">
                フローチャート
              </option>

              <option value="er">
                ER図
              </option>
            </select>
          </div>

          <div class="field">
            <label for="scale">
              PNG倍率
            </label>

            <select id="scale">
              <option value="max" selected>
                端末の最大サイズ
              </option>

              <option value="1">
                1倍
              </option>

              <option value="2">
                2倍
              </option>

              <option value="3">
                3倍
              </option>
            </select>
          </div>

          <div class="field">
            <label for="background">
              PNG背景
            </label>

            <select id="background">
              <option value="#ffffff" selected>
                白
              </option>

              <option value="transparent">
                透明
              </option>
            </select>
          </div>

          <div class="field">
            <label for="theme">
              Mermaidテーマ
            </label>

            <select id="theme">
              <option value="default" selected>
                標準
              </option>

              <option value="neutral">
                Neutral
              </option>

              <option value="forest">
                Forest
              </option>

              <option value="dark">
                Dark
              </option>
            </select>
          </div>

          <div class="field wide">
            <label for="filename">
              保存ファイル名
            </label>

            <input
              id="filename"
              type="text"
              value="mermaid_diagram"
              spellcheck="false"
            >
          </div>

          <div class="field wide">
            <label>
              検出したPNG上限
            </label>

            <div
              id="limitInfo"
              class="limit-info"
            >
              確認中…
            </div>
          </div>
        </div>
      </div>
    </details>

    <section class="grid">
      <article
        id="editorPanel"
        class="panel"
      >
        <div class="panel-title">
          <span>Mermaidコード</span>

          <span class="hint desktop-only">
            Ctrl / Cmd + Enterで描画
          </span>
        </div>

        <textarea
          id="source"
          spellcheck="false"
          aria-label="Mermaidコード"
          placeholder="flowchart TD&#10;    A[開始] --> B[終了]"
        ></textarea>
      </article>

      <article
        id="previewPanel"
        class="panel"
        data-view="hidden"
      >
        <div class="panel-title">
          <span>プレビュー</span>

          <span
            id="sizeInfo"
            class="hint"
          ></span>
        </div>

        <div id="previewWrap">
          <div
            id="preview"
            class="fit"
          ></div>
        </div>
      </article>
    </section>
  </main>

  <script type="module">
    /*
     * Mermaid本体をCDNから読み込む。
     */
    import mermaid from
      "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    const $ = selector => document.querySelector(selector);

    const source = $("#source");
    const preview = $("#preview");
    const status = $("#topStatus");
    const sizeInfo = $("#sizeInfo");
    const limitInfo = $("#limitInfo");

    const renderBtn = $("#renderBtn");
    const downloadBtn = $("#downloadBtn");
    const svgBtn = $("#svgBtn");
    const clearBtn = $("#clearBtn");
    const editTab = $("#editTab");
    const previewTab = $("#previewTab");
    const fitBtn = $("#fitBtn");

    const sampleSelect = $("#sampleSelect");
    const scaleSelect = $("#scale");
    const backgroundSelect = $("#background");
    const themeSelect = $("#theme");
    const filenameInput = $("#filename");

    const editorPanel = $("#editorPanel");
    const previewPanel = $("#previewPanel");

    /*
     * サンプルコード。
     * 必要なものをここへ増やせる。
     */
    const samples = {
      flow: String.raw`flowchart TD
    START(["開始"])
    CHECK{"条件を満たすか"}
    OK["処理を実行する"]
    NG["入力を修正する"]
    END(["終了"])

    START --> CHECK
    CHECK -->|はい| OK
    CHECK -->|いいえ| NG
    NG --> CHECK
    OK --> END`,

      er: String.raw`erDiagram
    USER ||--o{ ORDER : places
    ORDER ||--|{ ORDER_ITEM : contains
    PRODUCT ||--o{ ORDER_ITEM : included

    USER {
        bigint user_id PK
        varchar user_name
        varchar email
    }

    ORDER {
        bigint order_id PK
        bigint user_id FK
        datetime ordered_at
    }

    ORDER_ITEM {
        bigint order_item_id PK
        bigint order_id FK
        bigint product_id FK
        int quantity
    }

    PRODUCT {
        bigint product_id PK
        varchar product_name
        decimal price
    }`
    };

    const sampleFilenames = {
      flow: "flowchart",
      er: "er_diagram"
    };

    let statusTimer = 0;
    let detectedCanvasLimits = null;

    function isMobile() {
      return window.matchMedia(
        "(max-width: 900px)"
      ).matches;
    }

    /*
     * スマホでは編集画面とプレビューを切り替える。
     * PCでは両方を常時表示する。
     */
    function switchView(view) {
      if (!isMobile()) {
        editorPanel.removeAttribute("data-view");
        previewPanel.removeAttribute("data-view");
        return;
      }

      const showEditor = view === "edit";

      editorPanel.dataset.view =
        showEditor ? "visible" : "hidden";

      previewPanel.dataset.view =
        showEditor ? "hidden" : "visible";

      editTab.classList.toggle(
        "active",
        showEditor
      );

      previewTab.classList.toggle(
        "active",
        !showEditor
      );
    }

    function setStatus(
      message,
      isError = false,
      autoHide = false
    ) {
      window.clearTimeout(statusTimer);

      status.textContent = message;
      status.classList.toggle(
        "error",
        isError
      );
      status.classList.toggle(
        "show",
        Boolean(message)
      );

      if (
        autoHide &&
        message &&
        !isError
      ) {
        statusTimer = window.setTimeout(() => {
          status.classList.remove("show");
        }, 4000);
      }
    }

    function safeFilename(value) {
      const cleaned = value
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "_")
        .replace(/\.+$/g, "");

      return cleaned || "mermaid_diagram";
    }

    /*
     * Mermaid初期設定。
     *
     * htmlLabelsをfalseにすると、foreignObjectではなく
     * SVGのtext要素が使われるため、PNG変換時に文字が
     * 消えにくくなる。
     */
    function configureMermaid() {
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        theme: themeSelect.value,

        flowchart: {
          htmlLabels: false,
          useMaxWidth: false,
          curve: "basis"
        },

        er: {
          useMaxWidth: false,
          diagramPadding: 20,
          layoutDirection: "TB",
          minEntityWidth: 120,
          minEntityHeight: 80,
          entityPadding: 15,
          fontSize: 12
        }
      });
    }

    function getSvgDimensions(svgElement) {
      const viewBox =
        svgElement.viewBox?.baseVal;

      if (
        viewBox &&
        viewBox.width > 0 &&
        viewBox.height > 0
      ) {
        return {
          width: viewBox.width,
          height: viewBox.height,
          minX: viewBox.x,
          minY: viewBox.y
        };
      }

      const width = Number.parseFloat(
        svgElement.getAttribute("width")
      );

      const height = Number.parseFloat(
        svgElement.getAttribute("height")
      );

      if (
        Number.isFinite(width) &&
        Number.isFinite(height)
      ) {
        return {
          width,
          height,
          minX: 0,
          minY: 0
        };
      }

      const box =
        svgElement.getBoundingClientRect();

      return {
        width: Math.max(box.width, 1),
        height: Math.max(box.height, 1),
        minX: 0,
        minY: 0
      };
    }

    /*
     * Mermaid SVGを保存・PNG変換できる形へ整える。
     */
    function serializeSvg(
      svgElement,
      outputSize = null
    ) {
      const clone =
        svgElement.cloneNode(true);

      const d =
        getSvgDimensions(svgElement);

      clone.setAttribute(
        "xmlns",
        "http://www.w3.org/2000/svg"
      );

      clone.setAttribute(
        "viewBox",
        `${d.minX} ${d.minY} ${d.width} ${d.height}`
      );

      clone.setAttribute(
        "width",
        String(outputSize?.width ?? d.width)
      );

      clone.setAttribute(
        "height",
        String(outputSize?.height ?? d.height)
      );

      clone.setAttribute(
        "preserveAspectRatio",
        "xMinYMin meet"
      );

      /*
       * 保存画像でも日本語フォントを指定する。
       * フォントファイルそのものは埋め込まない。
       */
      const style =
        document.createElementNS(
          "http://www.w3.org/2000/svg",
          "style"
        );

      style.textContent = `
        text,
        tspan,
        .label,
        .entityLabel {
          font-family:
            -apple-system,
            BlinkMacSystemFont,
            "Hiragino Sans",
            "Yu Gothic",
            Meiryo,
            sans-serif !important;
        }
      `;

      clone.prepend(style);

      return new XMLSerializer()
        .serializeToString(clone);
    }

    async function renderDiagram() {
      const code = source.value.trim();

      if (!code) {
        setStatus(
          "Mermaidコードが空です。",
          true
        );
        switchView("edit");
        source.focus();
        throw new Error(
          "Mermaidコードが空です。"
        );
      }

      renderBtn.disabled = true;
      downloadBtn.disabled = true;
      svgBtn.disabled = true;

      setStatus("図を描画しています…");

      try {
        configureMermaid();

        const id =
          `mermaid-${Date.now()}-` +
          Math.random()
            .toString(36)
            .slice(2);

        const result =
          await mermaid.render(id, code);

        preview.innerHTML = result.svg;

        result.bindFunctions?.(preview);

        const svg =
          preview.querySelector("svg");

        if (!svg) {
          throw new Error(
            "SVGを生成できませんでした。"
          );
        }

        const d =
          getSvgDimensions(svg);

        sizeInfo.textContent =
          `${Math.round(d.width)} × ` +
          `${Math.round(d.height)} px`;

        setStatus(
          "描画しました。",
          false,
          true
        );

        if (isMobile()) {
          switchView("preview");
        }

        return svg;
      } catch (error) {
        preview.replaceChildren();
        sizeInfo.textContent = "";

        setStatus(
          `Mermaidの描画に失敗しました。\n` +
          `${error.message}`,
          true
        );

        switchView("edit");
        throw error;
      } finally {
        renderBtn.disabled = false;
        downloadBtn.disabled = false;
        svgBtn.disabled = false;
      }
    }

    /*
     * Canvasの一辺と総画素数の上限を簡易検査する。
     * 実測上限そのものではなく、余裕を持たせた値を採用する。
     */
    function canCreateCanvas(
      width,
      height
    ) {
      try {
        const canvas =
          document.createElement("canvas");

        canvas.width = width;
        canvas.height = height;

        if (
          canvas.width !== width ||
          canvas.height !== height
        ) {
          return false;
        }

        const context =
          canvas.getContext("2d");

        if (!context) {
          return false;
        }

        context.fillStyle = "#000";
        context.fillRect(
          width - 1,
          height - 1,
          1,
          1
        );

        const pixel =
          context.getImageData(
            width - 1,
            height - 1,
            1,
            1
          ).data;

        canvas.width = 1;
        canvas.height = 1;

        return pixel[3] === 255;
      } catch {
        return false;
      }
    }

    async function detectCanvasLimits() {
      if (detectedCanvasLimits) {
        return detectedCanvasLimits;
      }

      limitInfo.textContent =
        "端末のCanvas上限を確認中…";

      /*
       * 一辺の上限を二分探索する。
       */
      let low = 2048;
      let high = 32768;

      while (high - low > 512) {
        const mid =
          Math.floor(
            (low + high) / 2 / 256
          ) * 256;

        if (canCreateCanvas(mid, 1)) {
          low = mid;
        } else {
          high = mid;
        }

        await new Promise(resolve =>
          setTimeout(resolve, 0)
        );
      }

      const maxSide = low;

      /*
       * 総画素数は端末のメモリ影響が大きい。
       * 検査結果の70%を安全運用値にする。
       */
      const candidates = [
        16_000_000,
        24_000_000,
        32_000_000,
        48_000_000,
        64_000_000,
        96_000_000
      ];

      let testedPixels = 12_000_000;

      for (const pixels of candidates) {
        const width =
          Math.min(maxSide, 4096);

        const height =
          Math.floor(pixels / width);

        if (height > maxSide) {
          break;
        }

        if (
          canCreateCanvas(
            width,
            height
          )
        ) {
          testedPixels = pixels;
        } else {
          break;
        }

        await new Promise(resolve =>
          setTimeout(resolve, 0)
        );
      }

      detectedCanvasLimits = {
        maxSide,
        maxPixels:
          Math.floor(testedPixels * 0.7)
      };

      limitInfo.textContent =
        `一辺 約` +
        `${maxSide.toLocaleString()}px ／ ` +
        `安全総画素数 約` +
        `${Math.round(
          detectedCanvasLimits.maxPixels /
          1_000_000
        )}MP`;

      return detectedCanvasLimits;
    }

    function calculateOutputSize(
      dimensions,
      requested
    ) {
      const {
        maxSide,
        maxPixels
      } = detectedCanvasLimits;

      const sideScale = Math.min(
        maxSide / dimensions.width,
        maxSide / dimensions.height
      );

      const pixelScale = Math.sqrt(
        maxPixels /
        (
          dimensions.width *
          dimensions.height
        )
      );

      const deviceMaxScale =
        Math.min(
          sideScale,
          pixelScale
        );

      const wantedScale =
        requested === "max"
          ? deviceMaxScale
          : Number(requested);

      const scale =
        Math.min(
          wantedScale,
          deviceMaxScale
        );

      return {
        scale,
        width: Math.max(
          1,
          Math.floor(
            dimensions.width * scale
          )
        ),
        height: Math.max(
          1,
          Math.floor(
            dimensions.height * scale
          )
        ),
        reduced:
          requested !== "max" &&
          scale < Number(requested)
      };
    }

    /*
     * Blob URLを使わずData URLとしてSVGを読み込む。
     * ローカルHTMLをiPhone Safariで開いた際の
     * "The operation is insecure" を避けやすい。
     */
    function svgToDataUrl(svgText) {
      return (
        "data:image/svg+xml;charset=utf-8," +
        encodeURIComponent(svgText)
          .replace(/%0A/g, "")
          .replace(/%20/g, " ")
      );
    }

    async function drawSvgOnCanvas(
      svgText,
      width,
      height,
      background
    ) {
      const canvas =
        document.createElement("canvas");

      canvas.width = width;
      canvas.height = height;

      const context =
        canvas.getContext("2d");

      if (!context) {
        throw new Error(
          "Canvasを初期化できませんでした。"
        );
      }

      if (background !== "transparent") {
        context.fillStyle = background;
        context.fillRect(
          0,
          0,
          width,
          height
        );
      }

      const image = new Image();
      image.decoding = "async";

      await new Promise(
        (resolve, reject) => {
          image.onload = resolve;

          image.onerror = () => {
            reject(
              new Error(
                "SVG画像を読み込めませんでした。"
              )
            );
          };

          image.src =
            svgToDataUrl(svgText);
        }
      );

      context.drawImage(
        image,
        0,
        0,
        width,
        height
      );

      return canvas;
    }

    function canvasToBlob(canvas) {
      return new Promise(
        (resolve, reject) => {
          canvas.toBlob(
            blob => {
              if (blob) {
                resolve(blob);
              } else {
                reject(
                  new Error(
                    "PNGデータを生成できませんでした。"
                  )
                );
              }
            },
            "image/png"
          );
        }
      );
    }

    async function saveBlob(
      blob,
      filename
    ) {
      /*
       * iPhoneなどでファイル共有が使える場合は、
       * 共有シートを優先する。
       */
      try {
        const file = new File(
          [blob],
          filename,
          { type: blob.type }
        );

        if (
          navigator.canShare?.({
            files: [file]
          })
        ) {
          await navigator.share({
            files: [file],
            title: filename
          });

          return;
        }
      } catch (error) {
        if (error?.name === "AbortError") {
          return;
        }
      }

      /*
       * 通常のブラウザはダウンロードリンクを使う。
       */
      const url =
        URL.createObjectURL(blob);

      const anchor =
        document.createElement("a");

      anchor.href = url;
      anchor.download = filename;
      anchor.style.display = "none";

      document.body.append(anchor);
      anchor.click();
      anchor.remove();

      setTimeout(() => {
        URL.revokeObjectURL(url);
      }, 1500);
    }

    async function downloadPng() {
      downloadBtn.disabled = true;
      renderBtn.disabled = true;

      setStatus(
        "PNGの出力サイズを計算しています…"
      );

      let canvas = null;

      try {
        let svg =
          preview.querySelector("svg");

        /*
         * 未描画なら先に描画する。
         */
        if (!svg) {
          svg = await renderDiagram();
        }

        await detectCanvasLimits();

        const d =
          getSvgDimensions(svg);

        const requested =
          scaleSelect.value;

        const output =
          calculateOutputSize(
            d,
            requested
          );

        setStatus(
          `PNGを描画しています…\n` +
          `${output.width.toLocaleString()} × ` +
          `${output.height.toLocaleString()}px`
        );

        const svgText =
          serializeSvg(
            svg,
            {
              width: output.width,
              height: output.height
            }
          );

        canvas =
          await drawSvgOnCanvas(
            svgText,
            output.width,
            output.height,
            backgroundSelect.value
          );

        const blob =
          await canvasToBlob(canvas);

        const filename =
          `${safeFilename(
            filenameInput.value
          )}.png`;

        await saveBlob(
          blob,
          filename
        );

        const scaleText =
          output.scale.toFixed(3);

        let note =
          "端末で作成可能な最大級のサイズです。";

        if (
          requested !== "max" &&
          output.reduced
        ) {
          note =
            "指定倍率が端末上限を超えたため、自動縮小しました。";
        } else if (
          requested !== "max"
        ) {
          note =
            "指定倍率で作成しました。";
        }

        setStatus(
          `PNGを作成しました。\n` +
          `${output.width.toLocaleString()} × ` +
          `${output.height.toLocaleString()}px\n` +
          `元図比 ${scaleText}倍\n` +
          note,
          false,
          true
        );
      } catch (error) {
        setStatus(
          `PNGの作成に失敗しました。\n` +
          `${error.message}\n\n` +
          `巨大な図はSVG保存もお試しください。`,
          true
        );
      } finally {
        if (canvas) {
          canvas.width = 1;
          canvas.height = 1;
        }

        downloadBtn.disabled = false;
        renderBtn.disabled = false;
      }
    }

    async function downloadSvg() {
      svgBtn.disabled = true;

      try {
        let svg =
          preview.querySelector("svg");

        if (!svg) {
          svg = await renderDiagram();
        }

        const svgText =
          serializeSvg(svg);

        const blob = new Blob(
          [svgText],
          {
            type:
              "image/svg+xml;charset=utf-8"
          }
        );

        const filename =
          `${safeFilename(
            filenameInput.value
          )}.svg`;

        await saveBlob(
          blob,
          filename
        );

        setStatus(
          "SVGを保存しました。",
          false,
          true
        );
      } catch (error) {
        setStatus(
          `SVGの保存に失敗しました。\n` +
          `${error.message}`,
          true
        );
      } finally {
        svgBtn.disabled = false;
      }
    }

    function clearEditor() {
      if (!source.value.trim()) {
        setStatus(
          "コード欄はすでに空です。",
          false,
          true
        );
        return;
      }

      const confirmed =
        window.confirm(
          "Mermaidコードとプレビューをすべて消します。よろしいですか？"
        );

      if (!confirmed) {
        return;
      }

      source.value = "";
      preview.replaceChildren();
      sizeInfo.textContent = "";
      filenameInput.value =
        "mermaid_diagram";

      switchView("edit");
      source.focus();

      setStatus(
        "コードとプレビューをクリアしました。",
        false,
        true
      );
    }

    function loadSample(key) {
      const code = samples[key];

      if (!code) {
        return;
      }

      if (
        source.value.trim() &&
        !window.confirm(
          "現在のコードをサンプルで置き換えます。よろしいですか？"
        )
      ) {
        sampleSelect.value = "";
        return;
      }

      source.value = code;

      filenameInput.value =
        sampleFilenames[key] ??
        "mermaid_diagram";

      renderDiagram().catch(() => {});

      sampleSelect.value = "";
    }

    renderBtn.addEventListener(
      "click",
      () => {
        renderDiagram().catch(() => {});
      }
    );

    downloadBtn.addEventListener(
      "click",
      downloadPng
    );

    svgBtn.addEventListener(
      "click",
      downloadSvg
    );

    clearBtn.addEventListener(
      "click",
      clearEditor
    );

    editTab.addEventListener(
      "click",
      () => switchView("edit")
    );

    previewTab.addEventListener(
      "click",
      () => switchView("preview")
    );

    fitBtn.addEventListener(
      "click",
      () => {
        const fit =
          preview.classList.toggle("fit");

        fitBtn.textContent =
          fit
            ? "原寸で見る"
            : "幅に合わせる";
      }
    );

    sampleSelect.addEventListener(
      "change",
      () => {
        if (sampleSelect.value) {
          loadSample(
            sampleSelect.value
          );
        }
      }
    );

    themeSelect.addEventListener(
      "change",
      () => {
        if (source.value.trim()) {
          renderDiagram()
            .catch(() => {});
        }
      }
    );

    /*
     * エディタ内のショートカット。
     */
    source.addEventListener(
      "keydown",
      event => {
        /*
         * Ctrl / Cmd + Enterで描画。
         */
        if (
          (
            event.ctrlKey ||
            event.metaKey
          ) &&
          event.key === "Enter"
        ) {
          event.preventDefault();

          renderDiagram()
            .catch(() => {});

          return;
        }

        /*
         * Tabキーで4スペース挿入。
         */
        if (event.key === "Tab") {
          event.preventDefault();

          const start =
            source.selectionStart;

          const end =
            source.selectionEnd;

          source.setRangeText(
            "    ",
            start,
            end,
            "end"
          );
        }
      }
    );

    /*
     * ページ全体のショートカット。
     */
    window.addEventListener(
      "keydown",
      event => {
        /*
         * Ctrl / Cmd + SでPNG保存。
         */
        if (
          (
            event.ctrlKey ||
            event.metaKey
          ) &&
          event.key.toLowerCase() === "s"
        ) {
          event.preventDefault();
          downloadPng();
        }

        /*
         * Escapeでログを閉じる。
         */
        if (event.key === "Escape") {
          status.classList.remove("show");
        }
      }
    );

    window.addEventListener(
      "resize",
      () => {
        if (!isMobile()) {
          switchView("preview");
        }
      }
    );

    /*
     * 初期化。
     */
    source.value = "";
    sampleSelect.value = "";
    switchView("edit");

    detectCanvasLimits()
      .catch(() => {
        limitInfo.textContent =
          "上限を自動検出できませんでした";
      });

    setStatus(
      "Mermaidコードを入力するか、設定からサンプルを読み込んでください。",
      false,
      true
    );
  </script>
</body>

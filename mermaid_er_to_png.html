<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mermaid ER図 PNG変換</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --panel: #ffffff;
      --line: #cbd5e1;
      --text: #172033;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger-bg: #fff1f2;
      --danger: #be123c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family:
        "Yu Gothic UI", "Yu Gothic", "Hiragino Kaku Gothic ProN",
        "Meiryo", system-ui, sans-serif;
    }

    .app {
      width: min(1500px, calc(100% - 32px));
      margin: 24px auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 36px);
    }

    .lead {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 8px 30px rgb(15 23 42 / 0.06);
    }

    .field {
      display: grid;
      gap: 5px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #475569;
    }

    select,
    input,
    button {
      min-height: 42px;
      border-radius: 9px;
      font: inherit;
    }

    select,
    input {
      border: 1px solid var(--line);
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }

    input[type="text"] { width: 210px; }

    button {
      border: 0;
      padding: 9px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: wait; transform: none; }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover { background: var(--accent-hover); }

    .secondary {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(340px, 0.9fr) minmax(460px, 1.4fr);
      gap: 16px;
      min-height: 680px;
    }

    .panel {
      display: flex;
      min-width: 0;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 8px 30px rgb(15 23 42 / 0.06);
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 48px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
    }

    #source {
      width: 100%;
      flex: 1;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
      font: 14px/1.6 Consolas, "SFMono-Regular", Menlo, monospace;
      tab-size: 2;
    }

    #previewWrap {
      flex: 1;
      min-height: 580px;
      overflow: auto;
      padding: 24px;
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, #f8fafc 75%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, #f8fafc 75%) 12px -12px / 24px 24px,
        linear-gradient(45deg, #f8fafc 25%, white 25%) 12px 12px / 24px 24px;
    }

    #preview {
      display: grid;
      min-width: max-content;
      min-height: 100%;
      place-items: center;
    }

    #preview svg {
      max-width: none;
      height: auto;
      background: transparent;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      padding: 0 3px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      padding: 10px 12px;
      border: 1px solid #fecdd3;
      border-radius: 9px;
      background: var(--danger-bg);
      color: var(--danger);
      white-space: pre-wrap;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    @media (max-width: 900px) {
      .app { width: min(100% - 20px, 1500px); margin: 12px auto; }
      .grid { grid-template-columns: 1fr; }
      .panel { min-height: 480px; }
      #previewWrap { min-height: 430px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Mermaid ER図 → PNG</h1>
    <p class="lead">
      左側へMermaidコードを貼り、「図を描画」で確認してから「PNGを保存」を押します。
      PNG化はブラウザ内で行われます。
    </p>

    <section class="toolbar" aria-label="出力設定">
      <button id="renderBtn" class="primary" type="button">図を描画</button>
      <button id="downloadBtn" class="primary" type="button">PNGを保存</button>
      <button id="resetBtn" class="secondary" type="button">サンプルに戻す</button>

      <div class="field">
        <label for="scale">PNG倍率</label>
        <select id="scale">
          <option value="1">1倍</option>
          <option value="2" selected>2倍</option>
          <option value="3">3倍</option>
          <option value="4">4倍</option>
        </select>
      </div>

      <div class="field">
        <label for="background">背景</label>
        <select id="background">
          <option value="#ffffff" selected>白</option>
          <option value="transparent">透明</option>
        </select>
      </div>

      <div class="field">
        <label for="theme">テーマ</label>
        <select id="theme">
          <option value="default" selected>標準</option>
          <option value="neutral">Neutral</option>
          <option value="forest">Forest</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="field">
        <label for="filename">ファイル名</label>
        <input id="filename" type="text" value="hearing_er_diagram" spellcheck="false">
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <div class="panel-title">
          <span>Mermaidコード</span>
          <span class="hint">Ctrl / Cmd + Enterで描画</span>
        </div>
        <textarea id="source" spellcheck="false" aria-label="Mermaidコード"></textarea>
      </article>

      <article class="panel">
        <div class="panel-title">
          <span>プレビュー</span>
          <span id="sizeInfo" class="hint"></span>
        </div>
        <div id="previewWrap">
          <div id="preview"></div>
        </div>
      </article>
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    const sample = String.raw`erDiagram
    EMPLOYEE ||--o{ INTERVIEW : receives

    INTERVIEW ||--o| WORK_STATUS : records
    INTERVIEW ||--o| HEALTH_STATUS : records
    INTERVIEW ||--o{ EXERCISE_ACTIVITY : records
    INTERVIEW ||--o| WORKLOAD_STATUS : records
    INTERVIEW ||--o{ JOB_ASSIGNMENT : records
    INTERVIEW ||--o{ WORKPLACE_CONCERN : identifies
    INTERVIEW ||--o{ SKILL_ACTIVITY : records
    INTERVIEW ||--o{ GOAL_STATUS : reviews
    INTERVIEW ||--o{ ORGANIZATION_REQUEST : collects
    INTERVIEW ||--o{ FOLLOW_UP_ACTION : creates

    EMPLOYEE {
        bigint employee_id PK
        varchar employee_name
        varchar department_name
        varchar employment_status
        datetime created_at
        datetime updated_at
    }

    INTERVIEW {
        bigint interview_id PK
        bigint employee_id FK
        date interview_date
        varchar interview_type
        varchar interviewer_name
        varchar preferred_meeting_style
        text overall_summary
        datetime created_at
    }

    WORK_STATUS {
        bigint work_status_id PK
        bigint interview_id FK
        int remote_days_per_week
        int office_days_per_week
        varchar work_style_evaluation
        boolean continuation_preferred
        text remarks
    }

    HEALTH_STATUS {
        bigint health_status_id PK
        bigint interview_id FK
        varchar physical_condition
        varchar appetite_trend
        varchar weight_trend
        varchar sleep_trend
        boolean health_anxiety
        varchar follow_up_level
        text remarks
    }

    EXERCISE_ACTIVITY {
        bigint exercise_activity_id PK
        bigint interview_id FK
        varchar activity_type
        varchar start_area
        varchar destination
        int duration_minutes
        varchar frequency
        varchar performance_trend
        text remarks
    }

    WORKLOAD_STATUS {
        bigint workload_status_id PK
        bigint interview_id FK
        varchar overtime_level
        varchar overtime_outlook
        varchar leadership_workload
        boolean hidden_overtime_risk
        varchar psychological_load
        text remarks
    }

    JOB_ASSIGNMENT {
        bigint job_assignment_id PK
        bigint interview_id FK
        varchar assignment_type
        varchar target_system
        varchar technology
        varchar task_category
        varchar satisfaction_level
        text task_description
    }

    WORKPLACE_CONCERN {
        bigint concern_id PK
        bigint interview_id FK
        varchar concern_category
        varchar severity
        varchar status
        text concern_detail
        text assumed_cause
    }

    SKILL_ACTIVITY {
        bigint skill_activity_id PK
        bigint interview_id FK
        varchar skill_category
        varchar activity_name
        varchar activity_status
        varchar interest_level
        boolean work_related
        text remarks
    }

    GOAL_STATUS {
        bigint goal_status_id PK
        bigint interview_id FK
        varchar goal_name
        varchar goal_category
        varchar progress_status
        varchar psychological_barrier
        text next_step
        text remarks
    }

    ORGANIZATION_REQUEST {
        bigint request_id PK
        bigint interview_id FK
        varchar request_target
        varchar request_category
        boolean has_request
        text request_detail
    }

    FOLLOW_UP_ACTION {
        bigint follow_up_id PK
        bigint interview_id FK
        varchar follow_up_category
        varchar priority
        varchar action_owner
        date planned_check_date
        varchar status
        text action_detail
    }`;

    const source = document.querySelector("#source");
    const preview = document.querySelector("#preview");
    const status = document.querySelector("#status");
    const sizeInfo = document.querySelector("#sizeInfo");
    const renderBtn = document.querySelector("#renderBtn");
    const downloadBtn = document.querySelector("#downloadBtn");
    const resetBtn = document.querySelector("#resetBtn");
    const scaleSelect = document.querySelector("#scale");
    const backgroundSelect = document.querySelector("#background");
    const themeSelect = document.querySelector("#theme");
    const filenameInput = document.querySelector("#filename");

    source.value = sample;

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle("error", isError);
    }

    function safeFilename(value) {
      const cleaned = value
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "_")
        .replace(/\.+$/g, "");
      return cleaned || "mermaid_diagram";
    }

    function configureMermaid() {
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        theme: themeSelect.value,
        er: {
          useMaxWidth: false,
          diagramPadding: 20,
          layoutDirection: "TB",
          minEntityWidth: 120,
          minEntityHeight: 80,
          entityPadding: 15,
          stroke: "gray",
          fill: "honeydew",
          fontSize: 12
        }
      });
    }

    async function renderDiagram() {
      const code = source.value.trim();

      if (!code) {
        throw new Error("Mermaidコードが空です。");
      }

      renderBtn.disabled = true;
      downloadBtn.disabled = true;
      setStatus("描画しています…");

      try {
        configureMermaid();

        // 毎回異なるIDを使い、以前のSVG定義との衝突を避ける。
        const renderId = `mermaid-${Date.now()}-${Math.random()
          .toString(36)
          .slice(2)}`;

        const { svg, bindFunctions } = await mermaid.render(renderId, code);
        preview.innerHTML = svg;
        bindFunctions?.(preview);

        const svgElement = preview.querySelector("svg");
        if (!svgElement) {
          throw new Error("SVGを生成できませんでした。");
        }

        // Mermaidが付ける最大幅制限を外し、元の寸法を維持する。
        svgElement.style.maxWidth = "none";
        svgElement.style.height = "auto";

        const dimensions = getSvgDimensions(svgElement);
        sizeInfo.textContent =
          `${Math.round(dimensions.width)} × ${Math.round(dimensions.height)} px`;

        setStatus("描画しました。PNG倍率と背景を選び、「PNGを保存」を押してください。");
        return svgElement;
      } catch (error) {
        preview.replaceChildren();
        sizeInfo.textContent = "";
        setStatus(`Mermaidの描画に失敗しました。\n${error.message}`, true);
        throw error;
      } finally {
        renderBtn.disabled = false;
        downloadBtn.disabled = false;
      }
    }

    function getSvgDimensions(svgElement) {
      const viewBox = svgElement.viewBox?.baseVal;

      if (viewBox && viewBox.width > 0 && viewBox.height > 0) {
        return {
          width: viewBox.width,
          height: viewBox.height,
          minX: viewBox.x,
          minY: viewBox.y
        };
      }

      const width = Number.parseFloat(svgElement.getAttribute("width"));
      const height = Number.parseFloat(svgElement.getAttribute("height"));

      if (Number.isFinite(width) && Number.isFinite(height)) {
        return { width, height, minX: 0, minY: 0 };
      }

      const box = svgElement.getBoundingClientRect();
      return {
        width: Math.max(box.width, 1),
        height: Math.max(box.height, 1),
        minX: 0,
        minY: 0
      };
    }

    function serializeSvg(svgElement) {
      const clone = svgElement.cloneNode(true);
      const dimensions = getSvgDimensions(svgElement);

      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
      clone.setAttribute(
        "viewBox",
        `${dimensions.minX} ${dimensions.minY} ${dimensions.width} ${dimensions.height}`
      );
      clone.setAttribute("width", String(dimensions.width));
      clone.setAttribute("height", String(dimensions.height));

      // 外部CSSに依存しないよう、基本フォントをSVGへ埋め込む。
      const style = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "style"
      );
      style.textContent = `
        text, tspan, .label, .entityLabel {
          font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN",
                       Meiryo, sans-serif !important;
        }
      `;
      clone.prepend(style);

      return new XMLSerializer().serializeToString(clone);
    }

    async function downloadPng() {
      downloadBtn.disabled = true;
      setStatus("PNGを作成しています…");

      let objectUrl = "";

      try {
        let svgElement = preview.querySelector("svg");
        if (!svgElement) {
          svgElement = await renderDiagram();
        }

        const dimensions = getSvgDimensions(svgElement);
        const scale = Number(scaleSelect.value);
        const width = Math.max(1, Math.ceil(dimensions.width * scale));
        const height = Math.max(1, Math.ceil(dimensions.height * scale));

        // Canvasの実装上限を大きく超える画像は、メモリ不足になりやすい。
        const maxSide = 32767;
        if (width > maxSide || height > maxSide) {
          throw new Error(
            `出力サイズが大きすぎます（${width} × ${height}px）。倍率を下げてください。`
          );
        }

        const svgText = serializeSvg(svgElement);
        const svgBlob = new Blob([svgText], {
          type: "image/svg+xml;charset=utf-8"
        });
        objectUrl = URL.createObjectURL(svgBlob);

        const image = new Image();
        image.decoding = "async";

        await new Promise((resolve, reject) => {
          image.onload = resolve;
          image.onerror = () =>
            reject(new Error("SVGをPNG変換用画像として読み込めませんでした。"));
          image.src = objectUrl;
        });

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;

        const context = canvas.getContext("2d");
        if (!context) {
          throw new Error("Canvasを初期化できませんでした。");
        }

        const background = backgroundSelect.value;
        if (background !== "transparent") {
          context.fillStyle = background;
          context.fillRect(0, 0, width, height);
        } else {
          context.clearRect(0, 0, width, height);
        }

        context.setTransform(scale, 0, 0, scale, 0, 0);
        context.drawImage(image, 0, 0, dimensions.width, dimensions.height);

        const pngBlob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            blob => blob
              ? resolve(blob)
              : reject(new Error("PNGデータを生成できませんでした。")),
            "image/png"
          );
        });

        const downloadUrl = URL.createObjectURL(pngBlob);
        const anchor = document.createElement("a");
        anchor.href = downloadUrl;
        anchor.download = `${safeFilename(filenameInput.value)}.png`;
        document.body.append(anchor);
        anchor.click();
        anchor.remove();

        setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
        setStatus(`PNGを保存しました（${width} × ${height}px）。`);
      } catch (error) {
        setStatus(`PNGの作成に失敗しました。\n${error.message}`, true);
      } finally {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
        }
        downloadBtn.disabled = false;
      }
    }

    renderBtn.addEventListener("click", () => {
      renderDiagram().catch(() => {});
    });

    downloadBtn.addEventListener("click", downloadPng);

    resetBtn.addEventListener("click", () => {
      source.value = sample;
      themeSelect.value = "default";
      scaleSelect.value = "2";
      backgroundSelect.value = "#ffffff";
      filenameInput.value = "hearing_er_diagram";
      renderDiagram().catch(() => {});
    });

    themeSelect.addEventListener("change", () => {
      renderDiagram().catch(() => {});
    });

    source.addEventListener("keydown", event => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        event.preventDefault();
        renderDiagram().catch(() => {});
      }

      if (event.key === "Tab") {
        event.preventDefault();
        const start = source.selectionStart;
        const end = source.selectionEnd;
        source.setRangeText("    ", start, end, "end");
      }
    });

    renderDiagram().catch(() => {});
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2f7">
  <title>Mermaid図 PNG変換</title>
  <style>
    :root {
      color-scheme: light;
      --bg:#eef2f7; --panel:#fff; --line:#cbd5e1; --text:#172033;
      --muted:#64748b; --accent:#2563eb; --danger:#be123c;
    }
    * { box-sizing:border-box; }
    html, body {
      margin:0; min-height:100%; background:var(--bg); color:var(--text);
      font-family:"Yu Gothic UI","Yu Gothic","Hiragino Kaku Gothic ProN",
                  Meiryo,system-ui,sans-serif;
      -webkit-text-size-adjust:100%;
    }
    body { padding-bottom:env(safe-area-inset-bottom); }
    .app { width:min(1500px,calc(100% - 24px)); margin:14px auto; }
    h1 { margin:0 0 6px; font-size:clamp(23px,4vw,34px); }
    .lead { margin:0 0 12px; color:var(--muted); line-height:1.6; font-size:14px; }

    .toolbar {
      position:sticky; top:0; z-index:30; display:grid;
      grid-template-columns:repeat(4,minmax(120px,auto)) 1fr;
      gap:8px; align-items:end; padding:10px; margin-bottom:10px;
      border:1px solid var(--line); border-radius:14px;
      background:rgb(255 255 255 / .96);
      box-shadow:0 8px 30px rgb(15 23 42 / .07);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .field { display:grid; gap:4px; min-width:0; }
    label { font-size:12px; font-weight:700; color:#475569; }
    select,input,button {
      min-height:42px; border-radius:9px; font:inherit; font-size:16px;
    }
    select,input {
      width:100%; border:1px solid var(--line); padding:8px 10px;
      background:#fff; color:var(--text);
    }
    button {
      border:0; padding:9px 13px; cursor:pointer; font-weight:700;
      touch-action:manipulation;
    }
    button:disabled { opacity:.55; cursor:wait; }
    .primary { background:var(--accent); color:#fff; }
    .secondary { border:1px solid var(--line); background:#fff; color:var(--text); }

    .action-row {
      display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;
    }
    .action-row button { flex:0 0 auto; }

    .view-tabs {
      display:none; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;
    }
    .view-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    .grid {
      display:grid; grid-template-columns:minmax(340px,.9fr) minmax(460px,1.4fr);
      gap:14px; min-height:680px;
    }
    .panel {
      display:flex; min-width:0; flex-direction:column; overflow:hidden;
      border:1px solid var(--line); border-radius:14px; background:var(--panel);
      box-shadow:0 8px 30px rgb(15 23 42 / .06);
    }
    .panel-title {
      display:flex; justify-content:space-between; align-items:center;
      min-height:48px; padding:10px 14px; border-bottom:1px solid var(--line);
      font-weight:800;
    }
    #source {
      width:100%; flex:1; resize:vertical; border:0; outline:0; padding:14px;
      background:#0f172a; color:#e2e8f0;
      font:14px/1.55 Consolas,"SFMono-Regular",Menlo,monospace;
      tab-size:2;
    }
    #previewWrap {
      flex:1; min-height:580px; overflow:auto; padding:16px;
      background:
        linear-gradient(45deg,#f8fafc 25%,transparent 25%) 0 0/24px 24px,
        linear-gradient(45deg,transparent 75%,#f8fafc 75%) 0 0/24px 24px,
        linear-gradient(45deg,transparent 75%,#f8fafc 75%) 12px -12px/24px 24px,
        linear-gradient(45deg,#f8fafc 25%,#fff 25%) 12px 12px/24px 24px;
      -webkit-overflow-scrolling:touch;
    }
    #preview { display:grid; min-width:max-content; min-height:100%; place-items:center; }
    #preview.fit { min-width:0; width:100%; }
    #preview.fit svg { width:min(100%,1100px)!important; max-width:100%!important; height:auto!important; }
    .hint { color:var(--muted); font-size:12px; font-weight:400; }
    .status { min-height:24px; margin-top:9px; color:var(--muted); font-size:14px; }
    .status.error {
      padding:10px 12px; border:1px solid #fecdd3; border-radius:9px;
      background:#fff1f2; color:var(--danger); white-space:pre-wrap;
    }
    .notice {
      margin:0 0 10px; padding:9px 11px; border:1px solid #bfdbfe;
      border-radius:10px; background:#eff6ff; color:#1e3a8a;
      font-size:13px; line-height:1.55;
    }

    @media (max-width:900px) {
      .app { width:calc(100% - 12px); margin:6px auto; }
      h1 { font-size:22px; }
      .lead { font-size:13px; }
      .toolbar {
        top:env(safe-area-inset-top);
        grid-template-columns:1fr 1fr;
        padding:8px;
      }
      .toolbar .wide { grid-column:1/-1; }
      .action-row {
        position:sticky; top:184px; z-index:25;
        display:grid; grid-template-columns:1fr 1fr;
        padding:8px; margin:0 0 8px;
        border:1px solid var(--line); border-radius:12px;
        background:rgb(255 255 255 / .96);
      }
      .action-row button { width:100%; }
      .view-tabs { display:grid; }
      .grid { display:block; min-height:0; }
      .panel { min-height:calc(100dvh - 330px); }
      .panel[data-view="hidden"] { display:none; }
      #source { min-height:calc(100dvh - 390px); font-size:13px; }
      #previewWrap { min-height:calc(100dvh - 390px); padding:8px; }
      #preview { min-width:0; width:100%; }
      .desktop-only { display:none; }
    }

    @media (max-width:520px) {
      .toolbar { grid-template-columns:1fr 1fr; }
      .toolbar .wide { grid-column:1/-1; }
      .action-row { top:184px; }
    }
  </style>
</head>
<body>
<main class="app">
  <h1>Mermaid図 → PNG</h1>
  <p class="lead">ER図とフローチャートのサンプルを切り替え、ブラウザ内でPNG化できます。</p>

  <div class="notice">
    iPhone・iPad向けに、MermaidのHTMLラベルを無効化してSVG文字へ統一しています。
    これにより「The operation is insecure」が起きにくくなります。
  </div>

  <section class="toolbar">
    <div class="field wide">
      <label for="sampleSelect">サンプル</label>
      <select id="sampleSelect">
        <option value="er">ヒアリング記録 ER図</option>
        <option value="flow" selected>ヒアリング実施 フローチャート</option>
        <option value="flowSimple">簡易フローチャート</option>
      </select>
    </div>
    <div class="field">
      <label for="scale">PNG倍率</label>
      <select id="scale">
        <option value="1">1倍</option>
        <option value="2" selected>2倍</option>
        <option value="3">3倍</option>
      </select>
    </div>
    <div class="field">
      <label for="background">背景</label>
      <select id="background">
        <option value="#ffffff" selected>白</option>
        <option value="transparent">透明</option>
      </select>
    </div>
    <div class="field">
      <label for="theme">テーマ</label>
      <select id="theme">
        <option value="default" selected>標準</option>
        <option value="neutral">Neutral</option>
        <option value="forest">Forest</option>
        <option value="dark">Dark</option>
      </select>
    </div>
    <div class="field wide">
      <label for="filename">ファイル名</label>
      <input id="filename" value="hearing_flowchart" spellcheck="false">
    </div>
  </section>

  <div class="action-row">
    <button id="renderBtn" class="primary" type="button">図を描画</button>
    <button id="downloadBtn" class="primary" type="button">PNGを保存</button>
    <button id="svgBtn" class="secondary" type="button">SVGを保存</button>
    <button id="fitBtn" class="secondary" type="button">原寸で見る</button>
  </div>

  <div class="view-tabs">
    <button id="editTab" class="view-tab secondary active" type="button">編集</button>
    <button id="previewTab" class="view-tab secondary" type="button">プレビュー</button>
  </div>

  <section class="grid">
    <article id="editorPanel" class="panel">
      <div class="panel-title">
        <span>Mermaidコード</span>
        <span class="hint desktop-only">Ctrl / Cmd + Enterで描画</span>
      </div>
      <textarea id="source" spellcheck="false"></textarea>
    </article>

    <article id="previewPanel" class="panel" data-view="hidden">
      <div class="panel-title">
        <span>プレビュー</span>
        <span id="sizeInfo" class="hint"></span>
      </div>
      <div id="previewWrap">
        <div id="preview" class="fit"></div>
      </div>
    </article>
  </section>

  <div id="status" class="status" role="status" aria-live="polite"></div>
</main>

<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  import { Canvg } from "https://cdn.jsdelivr.net/npm/canvg@4.0.3/+esm";

  const samples = {
    er: String.raw`erDiagram
    EMPLOYEE ||--o{ INTERVIEW : receives
    INTERVIEW ||--o| WORK_STATUS : records
    INTERVIEW ||--o| HEALTH_STATUS : records
    INTERVIEW ||--o{ EXERCISE_ACTIVITY : records
    INTERVIEW ||--o| WORKLOAD_STATUS : records
    INTERVIEW ||--o{ JOB_ASSIGNMENT : records
    INTERVIEW ||--o{ WORKPLACE_CONCERN : identifies
    INTERVIEW ||--o{ SKILL_ACTIVITY : records
    INTERVIEW ||--o{ GOAL_STATUS : reviews
    INTERVIEW ||--o{ ORGANIZATION_REQUEST : collects
    INTERVIEW ||--o{ FOLLOW_UP_ACTION : creates

    EMPLOYEE {
        bigint employee_id PK
        varchar employee_name
        varchar department_name
        varchar employment_status
    }

    INTERVIEW {
        bigint interview_id PK
        bigint employee_id FK
        date interview_date
        varchar interviewer_name
        varchar preferred_meeting_style
        text overall_summary
    }

    WORK_STATUS {
        bigint work_status_id PK
        bigint interview_id FK
        int remote_days_per_week
        int office_days_per_week
        varchar work_style_evaluation
    }

    HEALTH_STATUS {
        bigint health_status_id PK
        bigint interview_id FK
        varchar physical_condition
        varchar appetite_trend
        varchar weight_trend
        varchar sleep_trend
        boolean health_anxiety
    }

    EXERCISE_ACTIVITY {
        bigint exercise_activity_id PK
        bigint interview_id FK
        varchar activity_type
        varchar route
        int duration_minutes
        varchar frequency
    }

    WORKLOAD_STATUS {
        bigint workload_status_id PK
        bigint interview_id FK
        varchar overtime_level
        varchar leadership_workload
        boolean hidden_overtime_risk
    }

    JOB_ASSIGNMENT {
        bigint job_assignment_id PK
        bigint interview_id FK
        varchar task_category
        varchar technology
        varchar satisfaction_level
    }

    WORKPLACE_CONCERN {
        bigint concern_id PK
        bigint interview_id FK
        varchar concern_category
        varchar severity
        text concern_detail
    }

    SKILL_ACTIVITY {
        bigint skill_activity_id PK
        bigint interview_id FK
        varchar activity_name
        varchar activity_status
        varchar interest_level
    }

    GOAL_STATUS {
        bigint goal_status_id PK
        bigint interview_id FK
        varchar goal_name
        varchar progress_status
        text next_step
    }

    ORGANIZATION_REQUEST {
        bigint request_id PK
        bigint interview_id FK
        boolean has_request
        text request_detail
    }

    FOLLOW_UP_ACTION {
        bigint follow_up_id PK
        bigint interview_id FK
        varchar follow_up_category
        varchar priority
        varchar status
        text action_detail
    }`,

    flow: String.raw`flowchart TD
    START([ヒアリング開始])
    PREP[事前準備<br/>過去の面談記録・勤務状況・目標を確認]
    INTRO[面談の目的を説明]
    PRIVACY[共有範囲を説明<br/>会社へ伝えてほしくない内容を確認]
    ICE[アイスブレーク<br/>天気・季節・仕事への影響など]

    WORKSTYLE[勤務形態<br/>在宅・出社・変更予定]
    HEALTH[体調・食事・睡眠]
    EXERCISE[運動・趣味・ストレス発散]
    LOAD[稼働・残業・今後の増加]
    TASK[作業内容・工程・必要スキル]
    TROUBLE[現場の困りごと・相談相手]
    PROJECT[現場期間・リリース・切れ間]
    MEMBER[同じ会社の社員との関係]
    STUDY[勉強・スキルアップ]
    SYSTEM[会社制度への質問]
    GOAL[目標設定の進捗]
    MEETING[次回面談の方法・日時・ツール]
    NOTICE[会社からの連絡事項]

    ISSUE{問題・懸念があるか}
    LISTEN[否定せず傾聴<br/>事実・気持ち・希望を整理]
    URGENT{緊急性が高いか}
    OWN{リーダー自身で対応可能か}
    FOLLOW[助言・確認・調整を実施]
    ESCALATE[竹島さん・営業・関係部署へ連携]
    SUMMARY[面談内容を要約し<br/>本人と認識を確認]
    ACTION[次回までの対応事項<br/>担当・期限・確認方法を決定]
    RECORD[公開範囲に注意して記録]
    END([ヒアリング終了])

    START --> PREP --> INTRO --> PRIVACY --> ICE
    ICE --> WORKSTYLE --> HEALTH --> EXERCISE --> LOAD --> TASK
    TASK --> TROUBLE --> PROJECT --> MEMBER --> STUDY
    STUDY --> SYSTEM --> GOAL --> MEETING --> NOTICE --> ISSUE

    ISSUE -- なし --> SUMMARY
    ISSUE -- あり --> LISTEN --> URGENT
    URGENT -- はい --> ESCALATE
    URGENT -- いいえ --> OWN
    OWN -- 可能 --> FOLLOW
    OWN -- 困難 --> ESCALATE
    FOLLOW --> SUMMARY
    ESCALATE --> SUMMARY
    SUMMARY --> ACTION --> RECORD --> END`,

    flowSimple: String.raw`flowchart TD
    START([ヒアリング開始])
    PREP[事前確認<br/>過去記録・目標・連絡事項]
    SAFE[目的と共有範囲を説明]
    ICE[アイスブレーク]

    BASIC[生活・勤務状況<br/>勤務形態／体調／食事／睡眠／運動]
    WORK[業務・稼働状況<br/>残業／作業内容／工程／必要スキル]
    ENV[現場環境<br/>困りごと／相談相手／現場期間]
    GROWTH[成長・目標<br/>勉強／制度／目標進捗]
    CONTACT[連絡・次回面談<br/>方法／日時／ツール／会社連絡]

    CONCERN{懸念事項があるか}
    LISTEN[傾聴して状況を整理]
    URGENT{緊急性が高いか}
    SUPPORT{自分で対応可能か}
    LOCAL[助言・確認・調整]
    SHARE[竹島さん・営業・関係部署へ連携]
    CONFIRM[本人と認識を確認]
    NEXT[次回までの対応を決定]
    RECORD[記録を作成]
    END([終了])

    START --> PREP --> SAFE --> ICE
    ICE --> BASIC --> WORK --> ENV --> GROWTH --> CONTACT --> CONCERN
    CONCERN -- なし --> CONFIRM
    CONCERN -- あり --> LISTEN --> URGENT
    URGENT -- はい --> SHARE
    URGENT -- いいえ --> SUPPORT
    SUPPORT -- 可能 --> LOCAL
    SUPPORT -- 困難 --> SHARE
    LOCAL --> CONFIRM
    SHARE --> CONFIRM
    CONFIRM --> NEXT --> RECORD --> END`
  };

  const filenames = {
    er: "hearing_er_diagram",
    flow: "hearing_flowchart",
    flowSimple: "hearing_flowchart_simple"
  };

  const $ = s => document.querySelector(s);
  const source = $("#source");
  const preview = $("#preview");
  const status = $("#status");
  const sizeInfo = $("#sizeInfo");
  const sampleSelect = $("#sampleSelect");
  const scaleSelect = $("#scale");
  const backgroundSelect = $("#background");
  const themeSelect = $("#theme");
  const filenameInput = $("#filename");
  const editorPanel = $("#editorPanel");
  const previewPanel = $("#previewPanel");
  const editTab = $("#editTab");
  const previewTab = $("#previewTab");

  function mobile() {
    return matchMedia("(max-width:900px)").matches;
  }

  function switchView(view) {
    if (!mobile()) {
      editorPanel.removeAttribute("data-view");
      previewPanel.removeAttribute("data-view");
      return;
    }
    const edit = view === "edit";
    editorPanel.dataset.view = edit ? "visible" : "hidden";
    previewPanel.dataset.view = edit ? "hidden" : "visible";
    editTab.classList.toggle("active", edit);
    previewTab.classList.toggle("active", !edit);
  }

  function setStatus(message, error=false) {
    status.textContent = message;
    status.classList.toggle("error", error);
  }

  function safeFilename(value) {
    return value.trim().replace(/[\\/:*?"<>|]+/g,"_").replace(/\.+$/g,"")
      || "mermaid_diagram";
  }

  function configureMermaid() {
    mermaid.initialize({
      startOnLoad:false,
      securityLevel:"strict",
      theme:themeSelect.value,
      flowchart:{
        htmlLabels:false,
        useMaxWidth:false,
        curve:"basis"
      },
      er:{
        useMaxWidth:false,
        diagramPadding:20,
        layoutDirection:"TB",
        minEntityWidth:120,
        minEntityHeight:80,
        entityPadding:15,
        fontSize:12
      }
    });
  }

  function dimensions(svg) {
    const vb = svg.viewBox?.baseVal;
    if (vb && vb.width > 0 && vb.height > 0) {
      return {width:vb.width,height:vb.height,minX:vb.x,minY:vb.y};
    }
    const w = parseFloat(svg.getAttribute("width"));
    const h = parseFloat(svg.getAttribute("height"));
    return {
      width:Number.isFinite(w)?w:svg.getBoundingClientRect().width,
      height:Number.isFinite(h)?h:svg.getBoundingClientRect().height,
      minX:0,minY:0
    };
  }

  function serializeSvg(svg) {
    const clone = svg.cloneNode(true);
    const d = dimensions(svg);
    clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    clone.setAttribute("viewBox",`${d.minX} ${d.minY} ${d.width} ${d.height}`);
    clone.setAttribute("width",String(d.width));
    clone.setAttribute("height",String(d.height));

    const style = document.createElementNS("http://www.w3.org/2000/svg","style");
    style.textContent = `
      text,tspan,.label,.entityLabel {
        font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",
                    "Yu Gothic",Meiryo,sans-serif !important;
      }
    `;
    clone.prepend(style);
    return new XMLSerializer().serializeToString(clone);
  }

  async function renderDiagram() {
    const code = source.value.trim();
    if (!code) throw new Error("Mermaidコードが空です。");

    $("#renderBtn").disabled = true;
    $("#downloadBtn").disabled = true;
    setStatus("描画しています…");

    try {
      configureMermaid();
      const id = `m-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      const {svg,bindFunctions} = await mermaid.render(id,code);
      preview.innerHTML = svg;
      bindFunctions?.(preview);

      const el = preview.querySelector("svg");
      if (!el) throw new Error("SVGを生成できませんでした。");

      const d = dimensions(el);
      sizeInfo.textContent = `${Math.round(d.width)} × ${Math.round(d.height)} px`;
      setStatus("描画しました。");
      if (mobile()) switchView("preview");
      return el;
    } catch (e) {
      preview.replaceChildren();
      sizeInfo.textContent = "";
      setStatus(`Mermaidの描画に失敗しました。\n${e.message}`,true);
      throw e;
    } finally {
      $("#renderBtn").disabled = false;
      $("#downloadBtn").disabled = false;
    }
  }

  async function saveBlob(blob,filename) {
    try {
      const file = new File([blob],filename,{type:blob.type});
      if (navigator.canShare?.({files:[file]})) {
        await navigator.share({files:[file],title:filename});
        return;
      }
    } catch (e) {
      if (e?.name === "AbortError") return;
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.style.display = "none";
    document.body.append(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }

  async function downloadPng() {
    $("#downloadBtn").disabled = true;
    setStatus("PNGを作成しています…");

    try {
      let svg = preview.querySelector("svg");
      if (!svg) svg = await renderDiagram();

      const d = dimensions(svg);
      const scale = Number(scaleSelect.value);
      const width = Math.max(1,Math.ceil(d.width*scale));
      const height = Math.max(1,Math.ceil(d.height*scale));

      if (width*height > 32_000_000) {
        throw new Error(`画像が大きすぎます（${width} × ${height}px）。倍率を下げてください。`);
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Canvasを初期化できませんでした。");

      const bg = backgroundSelect.value;
      if (bg !== "transparent") {
        ctx.fillStyle = bg;
        ctx.fillRect(0,0,width,height);
      }

      const renderer = Canvg.fromString(ctx,serializeSvg(svg),{
        ignoreAnimation:true,
        ignoreMouse:true,
        enableRedraw:false
      });

      ctx.save();
      ctx.scale(scale,scale);
      await renderer.render();
      ctx.restore();

      const blob = await new Promise((resolve,reject)=>{
        canvas.toBlob(
          b=>b?resolve(b):reject(new Error("PNGデータを生成できませんでした。")),
          "image/png"
        );
      });

      await saveBlob(blob,`${safeFilename(filenameInput.value)}.png`);
      setStatus(`PNGを作成しました（${width} × ${height}px）。`);
    } catch (e) {
      setStatus(
        `PNGの作成に失敗しました。\n${e.message}\n代わりに「SVGを保存」をお試しください。`,
        true
      );
    } finally {
      $("#downloadBtn").disabled = false;
    }
  }

  async function downloadSvg() {
    try {
      let svg = preview.querySelector("svg");
      if (!svg) svg = await renderDiagram();
      const blob = new Blob([serializeSvg(svg)],{type:"image/svg+xml;charset=utf-8"});
      await saveBlob(blob,`${safeFilename(filenameInput.value)}.svg`);
      setStatus("SVGを保存しました。");
    } catch (e) {
      setStatus(`SVGの保存に失敗しました。\n${e.message}`,true);
    }
  }

  function loadSample(key) {
    source.value = samples[key];
    filenameInput.value = filenames[key];
    renderDiagram().catch(()=>{});
  }

  sampleSelect.addEventListener("change",()=>loadSample(sampleSelect.value));
  themeSelect.addEventListener("change",()=>renderDiagram().catch(()=>{}));
  $("#renderBtn").addEventListener("click",()=>renderDiagram().catch(()=>{}));
  $("#downloadBtn").addEventListener("click",downloadPng);
  $("#svgBtn").addEventListener("click",downloadSvg);

  $("#fitBtn").addEventListener("click",()=>{
    const fit = preview.classList.toggle("fit");
    $("#fitBtn").textContent = fit ? "原寸で見る" : "幅に合わせる";
  });

  editTab.addEventListener("click",()=>switchView("edit"));
  previewTab.addEventListener("click",()=>switchView("preview"));

  source.addEventListener("keydown",e=>{
    if ((e.ctrlKey||e.metaKey) && e.key==="Enter") {
      e.preventDefault();
      renderDiagram().catch(()=>{});
    }
    if (e.key==="Tab") {
      e.preventDefault();
      const s=source.selectionStart, t=source.selectionEnd;
      source.setRangeText("    ",s,t,"end");
    }
  });

  addEventListener("resize",()=>{
    if (!mobile()) switchView("preview");
  });

  source.value = samples.flow;
  switchView("edit");
  renderDiagram().catch(()=>{});
</script>
</body>
</html>

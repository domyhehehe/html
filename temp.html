<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>勤務記録テンプレ作成</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      margin: 12px;
      line-height: 1.4;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    form {
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    input, textarea, button {
      font: inherit;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      width: 100%;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }
    button {
      cursor: pointer;
      border: 1px solid #999;
      background: #f7f7f7;
    }
    button.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    pre {
      background: #0b1020;
      color: #d7e2ff;
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .note {
      color: #555;
      font-size: 12px;
    }
    a.linkbtn {
      display: inline-block;
      text-align: center;
      padding: 12px;
      border: 1px solid #999;
      border-radius: 10px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      box-sizing: border-box;
      width: 100%;
    }
    .subbtn {
      display: inline-block;
      text-align: center;
      padding: 12px;
      border: 1px solid #999;
      border-radius: 10px;
      background: #f7f7f7;
      color: #111;
      text-decoration: none;
      font-size: 16px;
      box-sizing: border-box;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>勤務記録テンプレ作成</h1>

    <form id="templateForm">
      <label>②
        <textarea id="line2" rows="3"></textarea>
      </label>

      <label>開始時間
        <input type="time" id="start" value="09:00" />
      </label>

      <label>終了時間
        <input type="time" id="end" value="18:00" />
      </label>

      <label>残業開始時間
        <input type="time" id="overtimeStart" value="18:00" />
      </label>

      <label>作業内容（③）
        <textarea id="details"></textarea>
      </label>

      <label>感想（④）
        <textarea id="impression"></textarea>
      </label>

      <label>資格勉強時間（h）
        <input type="number" id="studyHours" value="0" min="0" step="0.25" />
      </label>

      <div class="actions">
        <button type="button" class="primary" id="generateBtn">リンク生成</button>
        <button type="button" id="copyBtn">リンクをコピー</button>
        <a class="linkbtn" id="openLink" href="./work.html">このテンプレで開く</a>
        <a class="subbtn" href="./work.html">勤務記録ページへ戻る</a>
      </div>

      <div class="note">
        入力内容をURL化して、勤務記録ページの初期値として渡します。GitHub Pagesでそのまま使えます。
      </div>
    </form>

    <h2 style="font-size:16px;margin:18px 0 8px;">生成URL</h2>
    <pre id="output"></pre>
  </div>

  <script>
    function buildTemplateObject() {
      return {
        line2: document.getElementById('line2').value,
        start: document.getElementById('start').value,
        end: document.getElementById('end').value,
        overtimeStart: document.getElementById('overtimeStart').value,
        details: document.getElementById('details').value,
        impression: document.getElementById('impression').value,
        studyHours: document.getElementById('studyHours').value
      };
    }

    function buildTemplateUrl() {
      const template = buildTemplateObject();
      const url = new URL('./work.html', location.href);
      url.searchParams.set('template', JSON.stringify(template));
      return url.toString();
    }

    function refreshUrl() {
      const url = buildTemplateUrl();
      document.getElementById('output').textContent = url;
      document.getElementById('openLink').href = url;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    (function init() {
      const ids = ['line2', 'start', 'end', 'overtimeStart', 'details', 'impression', 'studyHours'];
      ids.forEach(id => {
        document.getElementById(id).addEventListener('input', refreshUrl);
        document.getElementById(id).addEventListener('change', refreshUrl);
      });

      document.getElementById('generateBtn').addEventListener('click', refreshUrl);

      document.getElementById('copyBtn').addEventListener('click', async () => {
        const url = buildTemplateUrl();
        document.getElementById('output').textContent = url;
        document.getElementById('openLink').href = url;
        await copyText(url);
      });

      refreshUrl();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>HTML / JS / Python Runner Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <style>
    :root {
      --bg_color: #0f172a;
      --panel_color: #111827;
      --border_color: #334155;
      --text_color: #e5e7eb;
      --muted_text_color: #94a3b8;
      --accent_color: #38bdf8;
      --danger_color: #ef4444;
      --success_color: #22c55e;
      --warning_color: #f59e0b;
      --input_bg_color: #020617;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg_color);
      color: var(--text_color);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    body {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    textarea, select, input {
      -webkit-user-select: text;
      user-select: text;
      font: inherit;
    }

    .page_root {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
    }

    .panel_box {
      background: var(--panel_color);
      border: 1px solid var(--border_color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .title_text {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .description_text {
      margin: 0;
      color: var(--muted_text_color);
      line-height: 1.5;
      font-size: 14px;
    }

    .toolbar_row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .select_box,
    .action_button {
      min-height: 42px;
      border: 1px solid var(--border_color);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .select_box {
      background: var(--input_bg_color);
      color: var(--text_color);
      min-width: 160px;
    }

    .action_button {
      background: #1e293b;
      color: var(--text_color);
      cursor: pointer;
      font-weight: bold;
    }

    .primary_button {
      background: var(--accent_color);
      color: #001018;
      border-color: transparent;
    }

    .warning_button {
      background: var(--warning_color);
      color: #221300;
      border-color: transparent;
    }

    .danger_button {
      background: var(--danger_color);
      color: #fff7f7;
      border-color: transparent;
    }

    .editor_textarea {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      background: var(--input_bg_color);
      color: var(--text_color);
      border: 1px solid var(--border_color);
      border-radius: 10px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .status_box {
      margin-top: 10px;
      min-height: 24px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }

    .status_success {
      color: var(--success_color);
    }

    .status_error {
      color: var(--danger_color);
    }

    .status_warn {
      color: var(--warning_color);
    }
  </style>
</head>
<body>
  <div class="page_root">
    <section class="panel_box">
      <h1 class="title_text">HTML / JS / Python Runner Editor</h1>
      <p class="description_text">
        コードを入力して「newpreview.htmlで実行」を押すと、sessionStorage に保存して newpreview.html に遷移します。
        HTML / JavaScript / Python を切り替えできます。Python は newpreview.html 側で Pyodide を読み込みます。
      </p>
    </section>

    <section class="panel_box">
      <div class="toolbar_row">
        <select id="language_select" class="select_box" aria-label="language select">
          <option value="html">HTML</option>
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
        </select>

        <button id="sample_button" class="action_button" type="button">サンプル読込</button>
        <button id="open_preview_button" class="action_button primary_button" type="button">newpreview.htmlで実行</button>
        <button id="reset_button" class="action_button warning_button" type="button">初期化</button>
        <button id="clear_button" class="action_button danger_button" type="button">全削除</button>
      </div>

      <textarea id="code_input" class="editor_textarea" spellcheck="false"></textarea>
      <div id="status_box" class="status_box status_success"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY_MODE = "runner_mode_v1";
    const STORAGE_KEY_CODE_PREFIX = "runner_code_v1__";
    const STORAGE_KEY_PREVIEW_PAYLOAD = "runner_preview_payload_v1";

    const SAMPLE_CODE = {
      html: `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>HTML Sample</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      background: linear-gradient(180deg, #f8fafc, #dbeafe);
      color: #0f172a;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello HTML</h1>
    <p>これは HTML モードです。</p>
    <button onclick="document.body.style.background='#fde68a'">背景変更</button>
  </div>
</body>
</html>`,

      javascript: `const app = document.getElementById("app");

let count = 0;

function render() {
  app.innerHTML = \`
    <div style="font-family:sans-serif;padding:24px;background:linear-gradient(180deg,#f8fafc,#dcfce7);min-height:100vh;">
      <div style="max-width:520px;margin:0 auto;background:white;padding:20px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.12);">
        <h1>Hello JavaScript</h1>

        <button id="inc_btn">+1</button>
      </div>
    </div>
  \`;

  document.getElementById("inc_btn").onclick = function () {
    count += 1;
    console.log("count =", count);
    render();
  };
}

console.log("JavaScript sample started");
render();`,

      python: `from js import document

count = 0

def render():
    global count
    app = document.getElementById("app")
    app.innerHTML = f"""
    <div style="font-family:sans-serif;padding:24px;background:linear-gradient(180deg,#eff6ff,#ede9fe);min-height:100vh;">
      <div style="max-width:520px;margin:0 auto;background:white;padding:20px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.12);">
        <h1>Hello Python</h1>
        <p>count: <strong>{count}</strong></p>
        <button id="inc_btn">+1</button>
      </div>
    </div>
    """

    def on_click(event):
        global count
        count += 1
        print("count =", count)
        render()

    document.getElementById("inc_btn").onclick = on_click

print("Python sample started")
render()`
    };

    const elements = {
      language_select: document.getElementById("language_select"),
      code_input: document.getElementById("code_input"),
      sample_button: document.getElementById("sample_button"),
      open_preview_button: document.getElementById("open_preview_button"),
      reset_button: document.getElementById("reset_button"),
      clear_button: document.getElementById("clear_button"),
      status_box: document.getElementById("status_box")
    };

    const app_state = {
      current_mode: "html"
    };

    function set_status(message_text, status_type) {
      elements.status_box.textContent = message_text;
      elements.status_box.className = "status_box " + status_type;
    }

    function get_code_storage_key(mode) {
      return STORAGE_KEY_CODE_PREFIX + mode;
    }

    function save_current_code() {
      localStorage.setItem(get_code_storage_key(app_state.current_mode), elements.code_input.value);
      localStorage.setItem(STORAGE_KEY_MODE, app_state.current_mode);
    }

    function load_code_for_mode(mode) {
      const saved_code = localStorage.getItem(get_code_storage_key(mode));
      if (typeof saved_code === "string") {
        return saved_code;
      }
      return SAMPLE_CODE[mode];
    }

    function switch_mode(next_mode) {
      save_current_code();
      app_state.current_mode = next_mode;
      elements.language_select.value = next_mode;
      elements.code_input.value = load_code_for_mode(next_mode);
      set_status("モードを切り替えました。", "status_success");
    }

    function create_preview_payload_text(mode, code_text) {
      return JSON.stringify({
        mode: mode,
        code_text: code_text
      });
    }

    function open_preview_page() {
      try {
        save_current_code();

        const payload_text = create_preview_payload_text(
          app_state.current_mode,
          elements.code_input.value
        );

        sessionStorage.setItem(STORAGE_KEY_PREVIEW_PAYLOAD, payload_text);
        location.href = "newpreview.html";
      } catch (error) {
        set_status("newpreview.html起動失敗: " + (error.message || String(error)), "status_error");
      }
    }

    function load_sample() {
      elements.code_input.value = SAMPLE_CODE[app_state.current_mode];
      save_current_code();
      set_status("サンプルコードを読み込みました。", "status_success");
    }

    function reset_code() {
      const ok = window.confirm("現在モードのコードをサンプルに戻します。よろしいですか？");
      if (!ok) {
        set_status("初期化をキャンセルしました。", "status_warn");
        return;
      }

      elements.code_input.value = SAMPLE_CODE[app_state.current_mode];
      save_current_code();
      set_status("サンプルに戻しました。", "status_success");
    }

    function clear_code() {
      const ok = window.confirm("現在モードのコードを空にします。よろしいですか？");
      if (!ok) {
        set_status("全削除をキャンセルしました。", "status_warn");
        return;
      }

      elements.code_input.value = "";
      save_current_code();
      set_status("コードを空にしました。", "status_success");
    }

    function bind_events() {
      elements.language_select.addEventListener("change", function () {
        switch_mode(elements.language_select.value);
      });

      elements.code_input.addEventListener("input", function () {
        save_current_code();
      });

      elements.sample_button.addEventListener("click", load_sample);
      elements.open_preview_button.addEventListener("click", open_preview_page);
      elements.reset_button.addEventListener("click", reset_code);
      elements.clear_button.addEventListener("click", clear_code);
    }

    function start_app() {
      const saved_mode = localStorage.getItem(STORAGE_KEY_MODE);
      app_state.current_mode = SAMPLE_CODE[saved_mode] ? saved_mode : "html";
      elements.language_select.value = app_state.current_mode;
      elements.code_input.value = load_code_for_mode(app_state.current_mode);
      bind_events();
      set_status("準備完了。newpreview.htmlで実行できます。", "status_success");
    }

    start_app();
  </script>
</body>
</html>

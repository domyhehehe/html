<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>勤務記録（汎用・シングル②・モバイル）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      margin: 12px;
      line-height: 1.4;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    form {
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    input, textarea, button {
      font: inherit;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      width: 100%;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }
    button {
      cursor: pointer;
      border: 1px solid #999;
      background: #f7f7f7;
    }
    button.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .note {
      color: #555;
      font-size: 12px;
    }
    pre {
      background: #0b1020;
      color: #d7e2ff;
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eee;
      font-size: 12px;
    }
    .subactions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    a.linkbtn {
      display: inline-block;
      text-align: center;
      padding: 12px;
      border: 1px solid #999;
      border-radius: 10px;
      background: #f7f7f7;
      color: #111;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>勤務記録 <span class="pill">汎用</span></h1>

    <form id="workForm">
      <div class="row">
        <label>日付
          <input type="date" id="date" required />
        </label>
        <label>開始時間
          <input type="time" id="startTime" value="09:00" required />
        </label>
        <label>終了時間
          <input type="time" id="endTime" value="18:00" required />
        </label>
      </div>

      <label>②
        <textarea id="line2" rows="3"></textarea>
        <div class="note">URLテンプレから初期値を渡せます。</div>
      </label>

      <label>作業内容（③）
        <textarea id="details"></textarea>
      </label>

      <label>感想（④）
        <textarea id="impression"></textarea>
      </label>

      <label>
        資格勉強時間（h・任意）
        <input type="number" id="studyHours" value="0" min="0" step="0.25" />
        <div class="note">0 の場合は出力されません。</div>
      </label>

      <div class="actions">
        <button type="button" class="primary" id="generateBtn">生成</button>
        <button type="button" id="copyBtn">コピー</button>
        <button type="button" id="clearBtn">クリア</button>
      </div>

      <div class="subactions">
        <a class="linkbtn" href="./temp.html">テンプレ作成ページへ</a>
      </div>

      <div class="note">
        残業（⑤）は <b>残業開始時刻以降</b> のみです。例：18:30終了・残業開始18:00 → 0.5h
      </div>
    </form>

    <h2 style="font-size:16px;margin:18px 0 8px;">出力</h2>
    <pre id="output"></pre>
  </div>

  <script>
    const weekdays = ['月', '火', '水', '木', '金', '土', '日'];
    let overtimeStartMin = 18 * 60; // default 18:00

    function parseMin(t) {
      const parts = (t || '').split(':');
      const h = Number(parts[0] || 0);
      const m = Number(parts[1] || 0);
      return h * 60 + m;
    }

    function fmtMD(d) {
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function overtimeText(mins) {
      const h = Math.round((mins / 60) * 10) / 10;
      return (h % 1 === 0 ? h.toFixed(0) : h.toFixed(1)) + 'h';
    }

    function getQueryTemplate() {
      const params = new URLSearchParams(location.search);
      const raw = params.get('template');
      if (!raw) return null;

      try {
        return JSON.parse(raw);
      } catch (e) {
        console.error('template parse error:', e);
        return null;
      }
    }

    function applyTemplate(t) {
      if (!t) return;

      if (t.date) document.getElementById('date').value = t.date;
      if (t.start) document.getElementById('startTime').value = t.start;
      if (t.end) document.getElementById('endTime').value = t.end;
      if (t.overtimeStart) overtimeStartMin = parseMin(t.overtimeStart);

      if (t.line2 !== undefined) document.getElementById('line2').value = t.line2;
      if (t.details !== undefined) document.getElementById('details').value = t.details;
      if (t.impression !== undefined) document.getElementById('impression').value = t.impression;
      if (t.studyHours !== undefined) document.getElementById('studyHours').value = t.studyHours;
    }

    function setTodayIfEmpty() {
      const dateInput = document.getElementById('date');
      if (dateInput.value) return;

      const d = new Date();
      dateInput.value =
        d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function build() {
      const dateStr = document.getElementById('date').value;
      const s = document.getElementById('startTime').value;
      const e = document.getElementById('endTime').value;
      const l2 = document.getElementById('line2').value || '';
      const det = document.getElementById('details').value || '';
      const imp = document.getElementById('impression').value || '';
      const study = Number(document.getElementById('studyHours').value || 0);

      if (!dateStr) return '';

      const d = new Date(dateStr + 'T00:00:00');
      const wd = weekdays[(d.getDay() + 6) % 7];

      const endMin = parseMin(e);
      const otMin = Math.max(0, endMin - overtimeStartMin);

      let out =
`①${fmtMD(d)}(${wd})${s}～${e}
②${l2}
③${det}
④${imp}
⑤${overtimeText(otMin)}
`;

      if (study > 0) {
        out += `資格勉強時間：${study}h\n`;
      }

      return out;
    }

    function refreshOutput() {
      document.getElementById('output').textContent = build();
    }

    function clearForm() {
      document.getElementById('details').value = '';
      document.getElementById('impression').value = '';
      document.getElementById('studyHours').value = 0;
      document.getElementById('output').textContent = '';
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    (function init() {
      setTodayIfEmpty();
      applyTemplate(getQueryTemplate());

      document.getElementById('generateBtn').addEventListener('click', refreshOutput);

      document.getElementById('copyBtn').addEventListener('click', async () => {
        const text = build();
        document.getElementById('output').textContent = text;
        await copyText(text);
      });

      document.getElementById('clearBtn').addEventListener('click', clearForm);
    })();
  </script>
</body>
</html>

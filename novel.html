<!DOCTYPE html>
<!-- rebuilt-clean-single-version -->
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>汎用サウンドノベルJSONランナー 完全版</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --panel3: #0b1220;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #22c55e;
      --warn: #f59e0b;
      --danger: #fb7185;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      padding: 12px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    input, textarea, select, pre, code {
      user-select: text;
      -webkit-user-select: text;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    h1, h2, h3, p {
      margin: 0 0 10px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #001018;
      touch-action: manipulation;
    }

    .button.secondary {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .button.ok {
      background: var(--ok);
      color: white;
    }

    .button.danger {
      background: var(--danger);
      color: white;
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel2);
    }

    .status.ok {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.4);
    }

    .status.warn {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.4);
    }

    .status.fail {
      background: rgba(251, 113, 133, 0.12);
      border-color: rgba(251, 113, 133, 0.4);
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    textarea, select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    textarea {
      min-height: 280px;
      resize: vertical;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .pill {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill strong {
      color: var(--text);
    }

    .scene-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .speaker-line {
      margin-bottom: 10px;
      font-size: 15px;
      color: var(--accent);
      font-weight: 700;
    }

    .text-block {
      background: var(--panel3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      line-height: 1.8;
      margin-bottom: 10px;
      white-space: pre-wrap;
      font-size: 16px;
    }

    .choice-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .choice-button {
      width: 100%;
      text-align: left;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      touch-action: manipulation;
      line-height: 1.5;
    }

    .choice-button:hover {
      border-color: var(--accent);
    }

    .log-list {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    .log-item {
      background: var(--panel3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    code.inline {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>汎用サウンドノベルJSONランナー 完全版</h1>

    <div class="card">
      <h2>通知</h2>
      <div id="globalStatus" class="status warn">サンプルを読むか、AI用プロンプトをコピーしてJSONを作ってください。</div>
    </div>

    <div class="card">
      <h2>セットアップ</h2>

      <label class="label" for="promptModeSelect">コピーするAI用プロンプト</label>
      <select id="promptModeSelect">
        <option value="generic">汎用JSON台本ランナー用</option>
        <option value="shindo">新堂誠・学校であった怖い話 用</option>
      </select>

      <label class="label" for="scriptInput" style="margin-top: 12px;">台本JSON</label>
      <textarea id="scriptInput" spellcheck="false"></textarea>

      <p class="note">
        最小構造は <code class="inline">title</code>、<code class="inline">initial_state</code>、
        <code class="inline">start_scene_id</code>、<code class="inline">scenes</code> です。
        各 scene は <code class="inline">id</code>、<code class="inline">title</code>、
        <code class="inline">text</code>、<code class="inline">choices</code> を持ちます。
      </p>

      <div class="row">
        <button id="loadExampleButton" class="button secondary" type="button">サンプル読込</button>
        <button id="copyPromptButton" class="button secondary" type="button">AI用プロンプトをコピー</button>
        <button id="pasteScriptButton" class="button secondary" type="button">全削除してクリップボード貼り付け</button>
        <button id="loadScriptButton" class="button ok" type="button">このJSONで開始</button>
        <button id="restartButton" class="button secondary" type="button">最初からやり直す</button>
        <button id="copyStateButton" class="button secondary" type="button">現在状態をコピー</button>
      </div>
    </div>

    <div class="card">
      <h2>進行</h2>
      <div class="topbar">
        <div class="pill"><strong>タイトル:</strong> <span id="gameTitle">-</span></div>
        <div class="pill"><strong>現在シーン:</strong> <span id="currentSceneIdText">-</span></div>
        <div class="pill"><strong>既読数:</strong> <span id="stepText">0</span></div>
        <div class="pill"><strong>体力:</strong> <span id="healthText">-</span></div>
      </div>
    </div>

    <div class="card">
      <h2>本文</h2>
      <div id="sceneTitle" class="scene-title">-</div>
      <div id="speakerLine" class="speaker-line"></div>
      <div id="textArea"></div>
      <div id="choiceList" class="choice-list"></div>
    </div>

    <div class="card">
      <h2>ログ</h2>
      <div id="logList" class="log-list"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      function isObject(value) {
        return value !== null && typeof value === "object" && !Array.isArray(value);
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function safeParseJson(text) {
        try {
          return { ok: true, data: JSON.parse(text) };
        } catch (error) {
          return {
            ok: false,
            error: error instanceof Error ? error.message : String(error)
          };
        }
      }

      function setStatus(type, message) {
        const statusEl = document.getElementById("globalStatus");
        statusEl.className = `status ${type}`;
        statusEl.textContent = message;
      }

      async function copyTextToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        const succeeded = document.execCommand("copy");
        document.body.removeChild(textarea);

        if (!succeeded) {
          throw new Error("この環境ではクリップボードへのコピーが許可されていません。");
        }
      }

      async function readTextFromClipboard() {
        if (navigator.clipboard && window.isSecureContext) {
          return await navigator.clipboard.readText();
        }
        throw new Error("この環境ではクリップボードの読み取りが許可されていません。");
      }

      const el = {
        promptModeSelect: document.getElementById("promptModeSelect"),
        scriptInput: document.getElementById("scriptInput"),
        loadExampleButton: document.getElementById("loadExampleButton"),
        copyPromptButton: document.getElementById("copyPromptButton"),
        pasteScriptButton: document.getElementById("pasteScriptButton"),
        loadScriptButton: document.getElementById("loadScriptButton"),
        restartButton: document.getElementById("restartButton"),
        copyStateButton: document.getElementById("copyStateButton"),
        globalStatus: document.getElementById("globalStatus"),
        gameTitle: document.getElementById("gameTitle"),
        currentSceneIdText: document.getElementById("currentSceneIdText"),
        stepText: document.getElementById("stepText"),
        healthText: document.getElementById("healthText"),
        sceneTitle: document.getElementById("sceneTitle"),
        speakerLine: document.getElementById("speakerLine"),
        textArea: document.getElementById("textArea"),
        choiceList: document.getElementById("choiceList"),
        logList: document.getElementById("logList")
      };

      const app = {
        rawScript: null,
        script: null,
        state: null,
        currentSceneId: "",
        step: 0,
        log: [],

      };

      const SHINDO_BASE_PROMPT = [

      const SHINDO_PROMPT = [

      function getPromptByMode(mode) {
        return mode === "shindo" ? SHINDO_PROMPT : GENERIC_PROMPT;
      }

      function getSceneById(sceneId) {
        return app.script.scenes.find((scene) => scene.id === sceneId) || null;
      }

      function getHealthValue() {
        if (!app.state || !isObject(app.state)) return null;
        const keys = ["health", "hp", "体力"];
        for (const key of keys) {
          if (typeof app.state[key] === "number") {
            return app.state[key];
          }
        }
        return null;
      }

      function renderHeader() {
        el.gameTitle.textContent = app.script ? app.script.title : "-";
        el.currentSceneIdText.textContent = app.currentSceneId || "-";
        el.stepText.textContent = String(app.step);
        const hp = getHealthValue();
        el.healthText.textContent = hp === null ? "-" : String(hp);
      }

      function renderLog() {
        el.logList.innerHTML = "";
        app.log.slice().reverse().forEach((line) => {
          const div = document.createElement("div");
          div.className = "log-item";
          div.textContent = line;
          el.logList.appendChild(div);
        });
      }

      function addLog(line) {
        app.log.push(line);
        renderLog();
      }

      function getValueByPath(target, path) {
        const parts = path.split(".");
        let current = target;
        for (const part of parts) {
          if (!isObject(current) || !(part in current)) {
            return undefined;
          }
          current = current[part];
        }
        return current;
      }

      function ensurePath(target, path) {
        const parts = path.split(".");
        let current = target;
        for (let i = 0; i < parts.length - 1; i += 1) {
          const part = parts[i];
          if (!isObject(current[part])) {
            current[part] = {};
          }
          current = current[part];
        }
        return { parent: current, key: parts[parts.length - 1] };
      }

      function setValueByPath(target, path, value) {
        const ref = ensurePath(target, path);
        ref.parent[ref.key] = value;
      }

      function addValueByPath(target, path, delta) {
        const current = getValueByPath(target, path);
        const base = typeof current === "number" ? current : 0;
        setValueByPath(target, path, base + delta);
      }

      function applyEffects(effects) {
        if (!effects || !app.state) return;

        if (isObject(effects.add)) {
          for (const [path, delta] of Object.entries(effects.add)) {
            if (typeof delta === "number") {
              addValueByPath(app.state, path, delta);
            }
          }
        }

        if (isObject(effects.set)) {
          for (const [path, value] of Object.entries(effects.set)) {
            setValueByPath(app.state, path, value);
          }
        }

        if (Array.isArray(effects.set_flags)) {
          if (!Array.isArray(app.state.flags)) app.state.flags = [];
          effects.set_flags.forEach((flag) => {
            if (!app.state.flags.includes(flag)) {
              app.state.flags.push(flag);
            }
          });
        }

        if (Array.isArray(effects.remove_flags)) {
          if (!Array.isArray(app.state.flags)) app.state.flags = [];
          app.state.flags = app.state.flags.filter((flag) => !effects.remove_flags.includes(flag));
        }
      }

      function checkConditions(conditions) {
        if (!conditions || !app.state) return true;

        if (Array.isArray(conditions.required_flags)) {
          const flags = Array.isArray(app.state.flags) ? app.state.flags : [];
          for (const flag of conditions.required_flags) {
            if (!flags.includes(flag)) return false;
          }
        }

        if (Array.isArray(conditions.forbidden_flags)) {
          const flags = Array.isArray(app.state.flags) ? app.state.flags : [];
          for (const flag of conditions.forbidden_flags) {
            if (flags.includes(flag)) return false;
          }
        }

        if (isObject(conditions.min)) {
          for (const [path, minValue] of Object.entries(conditions.min)) {
            const current = getValueByPath(app.state, path);
            if (typeof current !== "number" || current < minValue) return false;
          }
        }

        if (isObject(conditions.max)) {
          for (const [path, maxValue] of Object.entries(conditions.max)) {
            const current = getValueByPath(app.state, path);
            if (typeof current !== "number" || current > maxValue) return false;
          }
        }

        return true;
      }

      function tryGameOverTransition() {
        const hp = getHealthValue();
        if (hp === null || hp > 0 || !app.script) {
          return false;
        }

        const gameOverSceneId = typeof app.script.game_over_scene_id === "string" ? app.script.game_over_scene_id.trim() : "";
        if (gameOverSceneId !== "") {
          const gameOverScene = getSceneById(gameOverSceneId);
          if (gameOverScene) {
            app.currentSceneId = gameOverSceneId;
            addLog(`GameOver: HP<=0 により ${gameOverSceneId} へ遷移`);
            renderScene();
            setStatus("fail", "体力が0以下になったため、ゲームオーバーへ遷移しました。");
            return true;
          }
        }

        renderHeader();
        el.currentSceneIdText.textContent = "GAME OVER";
        el.sceneTitle.textContent = "ゲームオーバー";
        el.speakerLine.textContent = "";
        el.textArea.innerHTML = `<div class="text-block">体力が尽きました。</div>`;
        el.choiceList.innerHTML = "";
        addLog("GameOver: HP<=0（専用シーン未設定）");
        setStatus("fail", "体力が0以下です。game_over_scene_id が未設定のため、標準ゲームオーバー表示です。");
        return true;
      }

      function renderScene() {
        if (!app.script || !app.currentSceneId) {
          el.sceneTitle.textContent = "-";
          el.speakerLine.textContent = "";
          el.textArea.innerHTML = "";
          el.choiceList.innerHTML = "";
          renderHeader();
          return;
        }

        const scene = getSceneById(app.currentSceneId);
        if (!scene) {
          setStatus("fail", `scene が見つかりません: ${app.currentSceneId}`);
          return;
        }

        renderHeader();
        el.sceneTitle.textContent = scene.title || scene.id;
        el.speakerLine.textContent = scene.speaker ? scene.speaker : "";
        renderTextProgression(scene);
      }

      function renderTextProgression(scene) {
        el.textArea.innerHTML = "";
        el.choiceList.innerHTML = "";

        const textLines = Array.isArray(scene.text) ? scene.text : [];
        const maxIndex = Math.max(0, textLines.length - 1);
        if (app.currentTextIndex > maxIndex) {
          app.currentTextIndex = maxIndex;
        }

        if (textLines.length > 0) {
          const div = document.createElement("div");
          div.className = "text-block";
          div.textContent = textLines[app.currentTextIndex] || "";
          el.textArea.appendChild(div);
        }

        const isLastText = app.currentTextIndex >= textLines.length - 1;
        if (!isLastText) {
          const nextButton = document.createElement("button");
          nextButton.type = "button";
          nextButton.className = "choice-button";
          nextButton.textContent = "▶ 次へ";
          nextButton.addEventListener("click", () => {
            app.currentTextIndex += 1;
            renderTextProgression(scene);
          });
          el.choiceList.appendChild(nextButton);
          setStatus("ok", "本文を読み進めてください。『次へ』で続きます。");
          return;
        }

        const availableChoices = scene.choices.filter((choice) => checkConditions(choice.conditions));

        availableChoices.forEach((choice, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "choice-button";
          button.textContent = `${index + 1}. ${choice.text}`;
          button.addEventListener("click", () => choose(choice));
          el.choiceList.appendChild(button);
        });

        if (availableChoices.length === 0) {
          setStatus("fail", "条件を満たす選択肢がありません。台本条件を確認してください。");
          return;
        }

        setStatus("ok", "選択肢を押して進めてください。");
      }

      function renderEnd() {
        renderHeader();
        el.currentSceneIdText.textContent = "END";
        el.sceneTitle.textContent = "終了";
        el.speakerLine.textContent = "";
        el.textArea.innerHTML = `<div class="text-block">この話はこれで終わりです。</div>`;
        el.choiceList.innerHTML = "";

        const restartLikeButton = document.createElement("button");
        restartLikeButton.type = "button";
        restartLikeButton.className = "choice-button";
        restartLikeButton.textContent = "最初からやり直す";
        restartLikeButton.addEventListener("click", () => {
          if (!app.rawScript) {
            setStatus("warn", "まだ読み込まれた台本がありません。");
            return;
          }
          startScript(app.rawScript);
          setStatus("ok", "最初からやり直しました。");
        });
        el.choiceList.appendChild(restartLikeButton);

        setStatus("ok", "エンディングに到達しました。ボタンで最初からやり直せます。");
      }

      function choose(choice) {
        const scene = getSceneById(app.currentSceneId);
        app.step += 1;

        addLog(
          [
            `Step ${app.step}`,
            `Scene: ${scene ? scene.id : "-"}`,
            `Choice: ${choice.text}`
          ].join("\n")
        );

        applyEffects(choice.effects);

        if (choice.next_scene_id === null) {
          renderEnd();
          return;
        }

        const gameOverSceneId = typeof app.script?.game_over_scene_id === "string"
          ? app.script.game_over_scene_id.trim()
          : "";
        const isInsideGameOverScene = gameOverSceneId !== "" && app.currentSceneId === gameOverSceneId;

        if (!isInsideGameOverScene && tryGameOverTransition()) {
          return;
        }

        app.currentSceneId = choice.next_scene_id;
        app.currentTextIndex = 0;
        renderScene();
      }

      function startScript(data) {
        app.rawScript = deepClone(data);
        app.script = deepClone(data);
        app.state = deepClone(data.initial_state || {});
        if (!Array.isArray(app.state.flags)) {
          app.state.flags = [];
        }
        app.currentSceneId = data.start_scene_id;
        app.step = 0;
        app.log = [];
        app.currentTextIndex = 0;
        addLog(`開始: ${data.title}`);

        if (tryGameOverTransition()) {
          return;
        }
        renderScene();
      }

      async function copyCurrentState() {
        const payload = {
          title: app.script ? app.script.title : null,
          current_scene_id: app.currentSceneId,
          step: app.step,
          state: app.state,
          log: app.log
        };
        await copyTextToClipboard(JSON.stringify(payload, null, 2));
      }

      function validateScript(data) {
        const errors = [];

        if (!isObject(data)) {
          errors.push("JSON全体はオブジェクトである必要があります。");
          return errors;
        }

        if (typeof data.title !== "string" || data.title.trim() === "") {
          errors.push("title は空でない文字列である必要があります。");
        }

        if (!isObject(data.initial_state)) {
          errors.push("initial_state はオブジェクトである必要があります。");
        }

        if (typeof data.start_scene_id !== "string" || data.start_scene_id.trim() === "") {
          errors.push("start_scene_id は空でない文字列である必要があります。");
        }

        if (data.game_over_scene_id !== undefined) {
          if (typeof data.game_over_scene_id !== "string" || data.game_over_scene_id.trim() === "") {
            errors.push("game_over_scene_id は空でない文字列である必要があります（未使用なら省略してください）。");
          }
        }

        if (!Array.isArray(data.scenes) || data.scenes.length === 0) {
          errors.push("scenes は1件以上の配列である必要があります。");
          return errors;
        }

        const sceneIds = new Set();

        data.scenes.forEach((scene, index) => {
          const label = `scenes[${index}]`;

          if (!isObject(scene)) {
            errors.push(`${label} はオブジェクトである必要があります。`);
            return;
          }

          if (typeof scene.id !== "string" || scene.id.trim() === "") {
            errors.push(`${label}.id は空でない文字列である必要があります。`);
          } else {
            if (sceneIds.has(scene.id)) {
              errors.push(`${label}.id が重複しています: ${scene.id}`);
            }
            sceneIds.add(scene.id);
          }

          if (scene.speaker !== undefined && typeof scene.speaker !== "string") {
            errors.push(`${label}.speaker は文字列である必要があります。`);
          }

          if (typeof scene.title !== "string") {
            errors.push(`${label}.title は文字列である必要があります。`);
          }

          if (!Array.isArray(scene.text) || scene.text.length === 0) {
            errors.push(`${label}.text は1件以上の文字列配列である必要があります。`);
          } else {
            scene.text.forEach((line, textIndex) => {
              if (typeof line !== "string") {
                errors.push(`${label}.text[${textIndex}] は文字列である必要があります。`);
              }
            });
          }

          if (!Array.isArray(scene.choices) || scene.choices.length === 0) {
            errors.push(`${label}.choices は1件以上の配列である必要があります。`);
          } else {
            scene.choices.forEach((choice, choiceIndex) => {
              const cLabel = `${label}.choices[${choiceIndex}]`;

              if (!isObject(choice)) {
                errors.push(`${cLabel} はオブジェクトである必要があります。`);
                return;
              }

              if (typeof choice.text !== "string" || choice.text.trim() === "") {
                errors.push(`${cLabel}.text は空でない文字列である必要があります。`);
              }

              if (choice.next_scene_id !== null && typeof choice.next_scene_id !== "string") {
                errors.push(`${cLabel}.next_scene_id は文字列または null である必要があります。`);
              }

              if (choice.effects !== undefined && !isObject(choice.effects)) {
                errors.push(`${cLabel}.effects はオブジェクトである必要があります。`);
              }

              if (choice.conditions !== undefined && !isObject(choice.conditions)) {
                errors.push(`${cLabel}.conditions はオブジェクトである必要があります。`);
              }
            });

            const nonNullNextIds = scene.choices
              .map((choice) => choice.next_scene_id)
              .filter((id) => typeof id === "string" && id.trim() !== "");

            if (scene.choices.length >= 2 && nonNullNextIds.length >= 2) {
              const uniqueIds = new Set(nonNullNextIds);
              if (uniqueIds.size === 1) {
                errors.push(`${label}.choices が見せかけ分岐になっています。2択以上ある場合は別々の next_scene_id を指定してください。`);
              }
            }
          }
        });

        if (typeof data.start_scene_id === "string" && data.start_scene_id.trim() !== "") {
          const exists = data.scenes.some((scene) => scene.id === data.start_scene_id);
          if (!exists) {
            errors.push("start_scene_id に対応する scene が存在しません。");
          }
        }

        if (typeof data.game_over_scene_id === "string" && data.game_over_scene_id.trim() !== "") {
          const exists = data.scenes.some((scene) => scene.id === data.game_over_scene_id);
          if (!exists) {
            errors.push("game_over_scene_id に対応する scene が存在しません。");
          }
        }

        data.scenes.forEach((scene, index) => {
          if (!Array.isArray(scene.choices)) return;
          scene.choices.forEach((choice, choiceIndex) => {
            if (typeof choice.next_scene_id === "string" && choice.next_scene_id.trim() !== "") {
              const exists = data.scenes.some((s) => s.id === choice.next_scene_id);
              if (!exists) {
                errors.push(`scenes[${index}].choices[${choiceIndex}].next_scene_id が存在しません: ${choice.next_scene_id}`);
              }
            }
          });
        });

        return errors;
      }

      function loadExample() {
        el.scriptInput.value = JSON.stringify(exampleScript, null, 2);
        setStatus("ok", "サンプルJSONを読み込みました。");
      }

      async function handleCopyPrompt() {
        try {
          const mode = el.promptModeSelect.value;
          await copyTextToClipboard(getPromptByMode(mode));
          setStatus(
            "ok",
            mode === "shindo"
              ? "新堂誠用プロンプトをクリップボードへコピーしました。"
              : "汎用プロンプトをクリップボードへコピーしました。"
          );
        } catch (error) {
          setStatus("fail", `コピー失敗: ${error instanceof Error ? error.message : String(error)}`);
        }
      }

      async function handlePasteScript() {
        try {
          el.scriptInput.value = "";
          el.scriptInput.value = await readTextFromClipboard();
          setStatus("ok", "JSON入力欄を全削除し、クリップボードの内容を貼り付けました。");
        } catch (error) {
          setStatus("fail", `貼り付け失敗: ${error instanceof Error ? error.message : String(error)}`);
        }
      }

      function loadScriptFromTextarea() {
        const parse = safeParseJson(el.scriptInput.value.trim());
        if (!parse.ok) {
          setStatus("fail", `JSON解析失敗:\n${parse.error}`);
          return;
        }

        const errors = validateScript(parse.data);
        if (errors.length > 0) {
          setStatus("fail", `台本エラー:\n${errors.join("\n")}`);
          return;
        }

        startScript(parse.data);
        setStatus("ok", "台本を読み込みました。");
      }

      function restartScript() {
        if (!app.rawScript) {
          setStatus("warn", "まだ読み込まれた台本がありません。");
          return;
        }
        startScript(app.rawScript);
        setStatus("ok", "最初からやり直しました。");
      }

      el.loadExampleButton.addEventListener("click", loadExample);
      el.copyPromptButton.addEventListener("click", handleCopyPrompt);
      el.pasteScriptButton.addEventListener("click", handlePasteScript);
      el.loadScriptButton.addEventListener("click", loadScriptFromTextarea);
      el.restartButton.addEventListener("click", restartScript);

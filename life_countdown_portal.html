<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Countdown Portal</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(20, 28, 52, 0.86);
      --panel-2: rgba(255,255,255,0.06);
      --text: #f7f8fb;
      --muted: #aab3c8;
      --accent: #7c9cff;
      --accent-2: #7ef0c5;
      --danger: #ff7f8e;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
                   "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(124,156,255,0.18), transparent 32%),
        radial-gradient(circle at 85% 0%, rgba(126,240,197,0.12), transparent 30%),
        linear-gradient(160deg, #090d18, #10182d 55%, #090d18);
      padding: 24px;
    }

    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 52px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .countdown {
      font-variant-numeric: tabular-nums;
      font-size: clamp(28px, 5vw, 54px);
      line-height: 1.18;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin: 12px 0;
    }

    .countdown small {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: normal;
    }

    .progress-wrap {
      margin-top: 20px;
    }

    .progress-bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .6s ease;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
      font: inherit;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,156,255,0.14);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 15px;
      color: white;
      background: linear-gradient(135deg, var(--accent), #5d70e8);
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.secondary { background: rgba(255,255,255,0.09); }
    button.danger { background: rgba(255,127,142,0.18); color: #ffb0ba; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .quote {
      padding: 16px;
      border-radius: 15px;
      background: var(--panel-2);
      color: #dce2f3;
      line-height: 1.8;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .dream-form {
      display: grid;
      grid-template-columns: 1fr 140px auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .dreams {
      display: grid;
      gap: 10px;
    }

    .dream {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .dream.done .dream-title {
      text-decoration: line-through;
      opacity: .55;
    }

    .dream-title {
      font-weight: 700;
    }

    .dream-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 0;
    }

    .today {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    textarea { min-height: 110px; resize: vertical; }

    footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .dream-form { grid-template-columns: 1fr; }
      header { align-items: start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Life Countdown</h1>
        <div class="subtitle">残り時間を眺めるためではなく、今日を選ぶための個人ポータル。</div>
      </div>
      <button class="secondary" id="resetButton">初期化</button>
    </header>

    <main class="grid">
      <section class="card">
        <h2>人生のカウントダウン</h2>
        <div class="countdown" id="countdown">設定してください</div>

        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress" id="progress"></div></div>
          <div class="progress-meta">
            <span id="elapsedLabel">経過 0%</span>
            <span id="remainingLabel">残り 100%</span>
          </div>
        </div>

        <div class="form-grid" style="margin-top:20px;">
          <div>
            <label for="birthDate">生年月日</label>
            <input type="date" id="birthDate" />
          </div>
          <div>
            <label for="lifeExpectancy">想定寿命</label>
            <input type="number" id="lifeExpectancy" min="1" max="130" step="0.1" value="84" />
          </div>
        </div>

        <div class="actions">
          <button id="saveSettings">設定を保存</button>
        </div>

        <div class="today">
          <label for="priority">今日いちばん大事なこと</label>
          <textarea id="priority" placeholder="例：仕事を早めに切り上げて、家族とゆっくり夕食を食べる"></textarea>
          <button id="savePriority">今日の一文を保存</button>
        </div>
      </section>

      <aside class="card">
        <h2>今日の問い</h2>
        <div class="quote" id="dailyQuestion">
          今日が無限に続かないと分かっていたら、何を後回しにしないだろう。
        </div>
        <div class="actions">
          <button class="secondary" id="nextQuestion">問いを変える</button>
        </div>
      </aside>

      <section class="card" style="grid-column:1/-1;">
        <h2>夢リスト</h2>
        <div class="dream-form">
          <input id="dreamTitle" type="text" placeholder="かなえたいこと" />
          <input id="dreamYear" type="number" min="2026" max="2200" placeholder="目標年" />
          <button id="addDream">追加</button>
        </div>
        <div class="dreams" id="dreams"></div>
      </section>
    </main>

    <footer>入力内容はこのブラウザ内の localStorage に保存されます。</footer>
  </div>

  <script>
    const STORAGE_KEY = "life-countdown-portal-v1";

    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || {
      birthDate: "",
      lifeExpectancy: 84,
      priority: "",
      dreams: []
    };

    const questions = [
      "今日が無限に続かないと分かっていたら、何を後回しにしないだろう。",
      "今の自分が本当に守りたいものは何だろう。",
      "他人の期待を一度外したとき、今日は何を選びたいだろう。",
      "未来の自分が今日の自分に感謝するとしたら、何をしたときだろう。",
      "いま抱えている悩みは、一年後にも同じ重さだろうか。",
      "今日ひとつだけ終わらせるなら、何を終わらせるだろう。"
    ];

    const el = id => document.getElementById(id);

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatRemaining(ms) {
      if (ms <= 0) return "想定寿命の日時を過ぎています";
      const sec = Math.floor(ms / 1000);
      const years = Math.floor(sec / 31557600);
      const days = Math.floor((sec % 31557600) / 86400);
      const hours = Math.floor((sec % 86400) / 3600);
      const minutes = Math.floor((sec % 3600) / 60);
      const seconds = sec % 60;
      return `${years}年 ${days}日 ${hours}時間 ${minutes}分 ${seconds}秒`;
    }

    function updateCountdown() {
      if (!state.birthDate || !state.lifeExpectancy) {
        el("countdown").innerHTML = '生年月日と想定寿命を設定してください<small>設定後、自動で毎秒更新されます</small>';
        el("progress").style.width = "0%";
        return;
      }

      const birth = new Date(`${state.birthDate}T00:00:00`);
      const target = new Date(birth);
      target.setTime(birth.getTime() + Number(state.lifeExpectancy) * 365.2425 * 24 * 60 * 60 * 1000);

      const now = new Date();
      const total = target - birth;
      const elapsed = now - birth;
      const remaining = target - now;
      const pct = Math.max(0, Math.min(100, elapsed / total * 100));

      el("countdown").innerHTML = `${formatRemaining(remaining)}<small>想定日時：${target.toLocaleString("ja-JP")}</small>`;
      el("progress").style.width = `${pct}%`;
      el("elapsedLabel").textContent = `経過 ${pct.toFixed(2)}%`;
      el("remainingLabel").textContent = `残り ${(100 - pct).toFixed(2)}%`;
    }

    function renderDreams() {
      const root = el("dreams");
      root.innerHTML = "";

      if (!state.dreams.length) {
        root.innerHTML = '<div class="empty">まだ夢は登録されていません。</div>';
        return;
      }

      const sorted = [...state.dreams].sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return (a.year || 9999) - (b.year || 9999);
      });

      sorted.forEach(dream => {
        const item = document.createElement("div");
        item.className = `dream ${dream.done ? "done" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = dream.done;
        checkbox.addEventListener("change", () => {
          dream.done = checkbox.checked;
          save();
          renderDreams();
        });

        const text = document.createElement("div");
        const title = document.createElement("div");
        title.className = "dream-title";
        title.textContent = dream.title;
        const meta = document.createElement("div");
        meta.className = "dream-meta";
        meta.textContent = dream.year ? `目標：${dream.year}年` : "目標年未設定";
        text.append(title, meta);

        const remove = document.createElement("button");
        remove.className = "danger";
        remove.textContent = "削除";
        remove.addEventListener("click", () => {
          state.dreams = state.dreams.filter(x => x.id !== dream.id);
          save();
          renderDreams();
        });

        item.append(checkbox, text, remove);
        root.appendChild(item);
      });
    }

    el("birthDate").value = state.birthDate;
    el("lifeExpectancy").value = state.lifeExpectancy;
    el("priority").value = state.priority;

    el("saveSettings").addEventListener("click", () => {
      state.birthDate = el("birthDate").value;
      state.lifeExpectancy = Number(el("lifeExpectancy").value || 84);
      save();
      updateCountdown();
    });

    el("savePriority").addEventListener("click", () => {
      state.priority = el("priority").value.trim();
      save();
    });

    el("addDream").addEventListener("click", () => {
      const title = el("dreamTitle").value.trim();
      if (!title) return;
      state.dreams.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        title,
        year: Number(el("dreamYear").value) || null,
        done: false
      });
      el("dreamTitle").value = "";
      el("dreamYear").value = "";
      save();
      renderDreams();
    });

    el("nextQuestion").addEventListener("click", () => {
      const current = el("dailyQuestion").textContent.trim();
      const others = questions.filter(q => q !== current);
      el("dailyQuestion").textContent = others[Math.floor(Math.random() * others.length)];
    });

    el("resetButton").addEventListener("click", () => {
      if (!confirm("保存内容をすべて初期化しますか？")) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    });

    renderDreams();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
